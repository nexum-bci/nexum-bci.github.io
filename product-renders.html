<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="page-base.css">
<title>产品渲染图集 - Nexum 逐念而行</title>
<link rel="icon" href="favicon.svg">
<script>
(function(){
  if (localStorage.getItem('nexum-theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<style>
/* Page-specific: image gallery */
img{opacity:1!important} /* override page-base img opacity */

.page-header{padding:120px 24px 32px}
.page-header h1{margin-bottom:8px}

/* Gallery grid */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px}
.gallery-2{grid-template-columns:repeat(2,1fr)}
.gallery-hero{grid-template-columns:1fr}
.gallery-hero .render-img{aspect-ratio:2/1;max-height:480px}
.gallery-hero .render-img img{object-position:60% center}

.render-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform 0.35s var(--ease-apple),box-shadow 0.35s var(--ease-apple);box-shadow:var(--shadow-sm)}
[data-theme="dark"] .render-card{box-shadow:none}
.render-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}

.render-img{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center}
.render-img img{width:100%;height:100%;object-fit:cover;object-position:center;transition:transform 0.5s var(--ease-apple)}
.render-card:hover .render-img img{transform:scale(1.04)}

.render-body{padding:20px 24px 24px}
.render-body h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
.render-body p{font-size:13px;color:var(--text-tertiary);line-height:1.5;margin:0}
.render-body .tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--accent-subtle);color:var(--accent);margin-top:10px}

.section-label-row{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.section-label-row h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent)}

@media(max-width:768px){
  .gallery,.gallery-2{grid-template-columns:1fr}
  .page-header h1{font-size:30px}
}
</style>
</head>
<body>

<section class="page-header">
 <div class="container">
 <h1>产品渲染图集</h1>
 <p class="page-sub">Nexum One 神经意图外骨骼 — 产品渲染图集</p>
 </div>
</section>

<section class="page-section" style="padding-top:0">
 <div class="container">

 <!-- Hero: Full system -->
 <div class="section-label-row"><h2>完整系统</h2></div>
 <div class="gallery gallery-hero">
 <div class="render-card">
 <div class="render-img" style="background:var(--bg);border-radius:var(--radius);padding:0;overflow:hidden"><div style="display:flex;align-items:flex-start;justify-content:center;gap:0;padding:20px 10px;background:var(--bg);border-radius:16px;min-height:320px">
  <!-- EEG-Sense -->
  <div style="flex:1;max-width:230px;text-align:center;padding:12px">
    <img src="docs/render_1_eeg.jpg" alt="EEG-Sense" style="width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:12px;border:1px solid var(--border)" loading="lazy">
    <div style="margin-top:10px;font-size:13px;font-weight:700;color:var(--text)">EEG-Sense 头带</div>
    <div style="font-size:11px;color:var(--text-tertiary)">8ch干电极 · 80g · 运动意图感知</div>
  </div>
  <!-- Arrow -->
  <div style="display:flex;align-items:center;padding-top:60px;flex-shrink:0">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
  </div>
  <!-- Control Box -->
  <div style="flex:1;max-width:230px;text-align:center;padding:12px">
    <img src="docs/render_2_controlbox.jpg" alt="控制盒" style="width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:12px;border:1px solid var(--border)" loading="lazy">
    <div style="margin-top:10px;font-size:13px;font-weight:700;color:var(--text)">控制盒</div>
    <div style="font-size:11px;color:var(--text-tertiary)">STM32H7 · 48Wh · AI意图翻译引擎</div>
  </div>
  <!-- Arrow -->
  <div style="display:flex;align-items:center;padding-top:60px;flex-shrink:0">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
  </div>
  <!-- NeuroSuit -->
  <div style="flex:1;max-width:230px;text-align:center;padding:12px">
    <img src="docs/render_3_neurosuit.jpg" alt="NeuroSuit" style="width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:12px;border:1px solid var(--border)" loading="lazy">
    <div style="margin-top:10px;font-size:13px;font-weight:700;color:var(--text)">NeuroSuit 肌动服</div>
    <div style="font-size:11px;color:var(--text-tertiary)">碳纤维锚定 · 直驱电机 · ~2.5kg · 10s穿脱</div>
  </div>
</div>

<!-- Latency line -->
<div style="text-align:center;margin-top:12px;padding:8px 16px;background:var(--bg);border-radius:20px;display:inline-block;width:100%">
  <span style="font-size:12px;color:var(--text-secondary)">端到端延迟 <strong style="color:var(--accent);font-size:14px">~150-200ms</strong> &nbsp;·&nbsp; BLE无线 + UART有线</span>
</div></div>
