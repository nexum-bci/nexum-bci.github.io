<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta property="og:title" content="产品渲染 - Nexum 逐念而行">
<meta property="og:description" content="Nexum One 产品渲染图：EEG-Sense、NeuroCore、NeuroSuit">
<meta property="og:type" content="website">
<meta property="og:image" content="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="page-base.css">
<title>产品渲染图集 - Nexum 逐念而行</title>
<link rel="icon" href="favicon.svg">
<script>(function(){if(localStorage.getItem('nexum-theme')==='dark'){document.documentElement.setAttribute('data-theme','dark')}})();</script>
<style>
img{opacity:1!important}
.module-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.module-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .35s var(--ease-apple),box-shadow .35s var(--ease-apple);box-shadow:var(--shadow-sm)}
.module-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.module-card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;transition:transform .5s var(--ease-apple)}
.module-card:hover img{transform:scale(1.04)}
.module-body{padding:20px 24px 24px}
.module-body h3{font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px}
.module-body p{font-size:14px;color:var(--text-secondary);line-height:1.5;margin:0}
.module-body .tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--accent-subtle);color:var(--accent);margin-top:10px}
@media(max-width:768px){.module-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<section class="page-header">
 <div class="container">
 <h1>产品渲染图集</h1>
 <p class="page-sub">Nexum One 神经意图外骨骼 — EEG-Sense · NeuroCore · NeuroSuit</p>
 </div>
</section>

<section class="page-section" style="padding-top:0">
 <div class="container">

 <div class="content-card" style="margin-bottom:40px">

 <div style="background:var(--bg);border-radius:var(--radius);padding:12px;margin-top:24px;text-align:center">

  <defs>
    <filter id="ss"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/></filter>
    <linearGradient id="neuroGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5a5a60"/><stop offset="100%" stop-color="#3a3a40"/></linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6a6a70"/><stop offset="100%" stop-color="#4a4a50"/></linearGradient>
    <linearGradient id="motorGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d0d0d8"/><stop offset="100%" stop-color="#888890"/></linearGradient>
  </defs>
  <rect width="900" height="360" rx="16" fill="var(--bg-card)"/>
  <g transform="translate(30,30)" filter="url(#ss)">
    <rect x="0" y="0" width="250" height="300" rx="16" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>

    <path d="M 65 160 Q 65 68 125 63 Q 185 68 185 160" fill="none" stroke="#2a2a30" stroke-width="14" stroke-linecap="round"/>

    <circle cx="195" cy="110" r="4" fill="#0096f0" opacity="0.9"/><circle cx="195" cy="110" r="8" fill="#0096f0" opacity="0.2"/>
    <text x="125" y="210" text-anchor="middle" fill="var(--text)" font-size="15" font-weight="700">EEG-Sense 意图感知头带</text>
    <text x="125" y="232" text-anchor="middle" fill="var(--text-tertiary)" font-size="12">8ch干电极 · 80g</text>
    <text x="125" y="252" text-anchor="middle" fill="var(--accent)" font-size="11" font-weight="600">神经意图感知</text>
  </g>
  <line x1="285" y1="180" x2="315" y2="180" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"/>

  <text x="300" y="170" text-anchor="middle" fill="var(--text-tertiary)" font-size="9">BLE</text>
  <g transform="translate(328,30)" filter="url(#ss)">
    <rect x="0" y="0" width="250" height="300" rx="16" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
    <rect x="42" y="55" width="160" height="120" rx="14" fill="url(#boxGrad)"/>
    <rect x="62" y="70" width="120" height="62" rx="6" fill="#0a0a10"/>
    <rect x="72" y="78" width="100" height="12" rx="3" fill="#1a3a5a"/>
    <rect x="72" y="94" width="60" height="8" rx="2" fill="#0a2a4a"/>
    <rect x="72" y="106" width="80" height="6" rx="2" fill="#0a2a4a"/>
    <circle cx="152" cy="114" r="8" fill="none" stroke="#0096f0" stroke-width="2"/>
    <rect x="82" y="180" width="40" height="8" rx="3" fill="#1a1a1e"/>
    <circle cx="195" cy="165" r="3" fill="#0096f0" opacity="0.8"/>
    <text x="122" y="230" text-anchor="middle" fill="var(--text)" font-size="15" font-weight="700">NeuroCore 控制中枢</text>
    <text x="122" y="252" text-anchor="middle" fill="var(--text-tertiary)" font-size="12">STM32H7 · 48Wh</text>
    <text x="122" y="272" text-anchor="middle" fill="var(--accent)" font-size="11" font-weight="600">AI实时意图控制</text>
  </g>
  <line x1="577" y1="180" x2="607" y2="180" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="607,175 615,180 607,185" fill="var(--accent)" opacity="0.5"/>
  <text x="592" y="170" text-anchor="middle" fill="var(--text-tertiary)" font-size="9">UART</text>
  <g transform="translate(620,30)" filter="url(#ss)">
    <rect x="0" y="0" width="250" height="300" rx="16" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
    <rect x="65" y="55" width="120" height="16" rx="6" fill="#252528"/>
    <path d="M 65 68 L 65 220 Q 65 235 80 235 L 95 235 L 95 68 Z" fill="url(#neuroGrad)"/>
    <path d="M 155 68 L 155 220 Q 155 235 170 235 L 185 235 L 185 68 Z" fill="url(#neuroGrad)"/>
    <path d="M 95 68 Q 125 85 155 68" fill="url(#neuroGrad)"/>
    <ellipse cx="55" cy="160" rx="14" ry="22" fill="url(#motorGrad)"/><ellipse cx="55" cy="160" rx="8" ry="14" fill="#a0a0a8"/>
    <ellipse cx="195" cy="160" rx="14" ry="22" fill="url(#motorGrad)"/><ellipse cx="195" cy="160" rx="8" ry="14" fill="#a0a0a8"/>
    <rect x="58" y="75" width="10" height="30" rx="3" fill="#3a3a40"/>
    <rect x="182" y="75" width="10" height="30" rx="3" fill="#3a3a40"/>
    <text x="125" y="270" text-anchor="middle" fill="var(--text)" font-size="15" font-weight="700">NeuroSuit 神经意图肌动服</text>
    <text x="125" y="290" text-anchor="middle" fill="var(--text-tertiary)" font-size="12">~2.5kg · 12Nm · 10s穿脱</text>
  </g>
</svg>
 </div>
 </div>

 <div class="content-card">
 <h2 style="margin-top:0">核心模块</h2>
 <div class="module-grid" style="margin-top:24px">
 <div class="module-card">
  <img src="docs/render_1_eeg.jpg" alt="EEG-Sense 意图感知头带 — 8通道干电极神经信号采集装置，重约80克" loading="lazy">
  <div class="module-body"><h3>EEG-Sense 意图感知头带</h3><p>8通道干电极 · 80g · 检测运动准备电位</p><span class="tag">神经接口</span></div>
 </div>
 <div class="module-card">
  <img src="docs/render_2_controlbox.jpg" alt="NeuroCore 控制中枢 — 搭载STM32H7与nRF5340双处理器，集成AI推理引擎" loading="lazy">
  <div class="module-body"><h3>NeuroCore 控制中枢</h3><p>STM32H7 + nRF5340 · AI推理引擎</p><span class="tag">计算核心</span></div>
 </div>
 <div class="module-card">
  <img src="docs/render_3_neurosuit.jpg" alt="NeuroSuit 神经意图肌动服 — 碳纤维髋关节锚定结构，直驱电机执行系统" loading="lazy">
  <div class="module-body"><h3>NeuroSuit 神经意图肌动服</h3><p>碳纤维锚定 · 直驱电机 · ~2.5kg</p><span class="tag">执行系统</span></div>
 </div>
 </div>
 </div>

 </div>
</section>

<script src="shared.js"></script>
<script>
document.querySelectorAll("img").forEach(function(img){if(img.complete)img.classList.add("loaded");else img.addEventListener("load",function(){img.classList.add("loaded")})});
</script>
</body>
</html>
