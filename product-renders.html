<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="page-base.css">
<title>产品渲染图集 - Nexum 逐念而行</title>
<link rel="icon" href="favicon.svg">
<script>(function(){if(localStorage.getItem('nexum-theme')==='dark'){document.documentElement.setAttribute('data-theme','dark')}})();</script>
<style>
img{opacity:1!important}
.page-header{padding:120px 24px 32px}
.page-header h1{margin-bottom:8px}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.render-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .35s var(--ease-apple),box-shadow .35s var(--ease-apple);box-shadow:var(--shadow-sm)}
.render-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.render-img{aspect-ratio:1/1;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center}
.render-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease-apple)}
.render-card:hover .render-img img{transform:scale(1.04)}
.render-body{padding:20px 24px 24px}
.render-body h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
.render-body p{font-size:13px;color:var(--text-tertiary);line-height:1.5;margin:0}
.render-body .tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--accent-subtle);color:var(--accent);margin-top:10px}
.section-label-row{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.section-label-row h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent)}
@media(max-width:768px){.gallery{grid-template-columns:1fr}.page-header h1{font-size:30px}}
</style>
</head>
<body>

<section class="page-header">
 <div class="container">
 <h1>产品渲染图集</h1>
 <p class="page-sub">Nexum One 神经意图外骨骼 — 产品渲染图集</p>
 </div>
</section>

<section class="page-section" style="padding-top:0">
 <div class="container">

 <div class="section-label-row"><h2>核心模块</h2></div>
 <div class="gallery">
 <div class="render-card">
  <div class="render-img"><img src="docs/render_1_eeg.jpg" alt="EEG-Sense头带" loading="lazy"></div>
  <div class="render-body"><h3>EEG-Sense 头带</h3><p>8通道干电极 · 80g · 检测运动准备电位</p><span class="tag">神经接口</span></div>
 </div>
 <div class="render-card">
  <div class="render-img"><img src="docs/render_2_controlbox.jpg" alt="控制盒" loading="lazy"></div>
  <div class="render-body"><h3>控制盒</h3><p>STM32H7 + nRF5340 · AI策略引擎</p><span class="tag">计算核心</span></div>
 </div>
 <div class="render-card">
  <div class="render-img"><img src="docs/render_3_neurosuit.jpg" alt="NeuroSuit" loading="lazy"></div>
  <div class="render-body"><h3>NeuroSuit 肌动服</h3><p>碳纤维锚定 · 直驱电机 · ~2.5kg</p><span class="tag">执行系统</span></div>
 </div>
 </div>

 </div>
</section>

<script src="shared.js"></script>
<script>
document.querySelectorAll("img").forEach(function(img){if(img.complete)img.classList.add("loaded");else img.addEventListener("load",function(){img.classList.add("loaded")})});
</script>
</body>
</html>
