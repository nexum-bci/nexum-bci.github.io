<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="page-base.css">
<title>产品渲染图集 - Nexum 逐念而行</title>
<link rel="icon" href="favicon.svg">
<script>(function(){if(localStorage.getItem('nexum-theme')==='dark'){document.documentElement.setAttribute('data-theme','dark')}})();</script>
<style>
img{opacity:1!important}
.module-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.module-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .35s var(--ease-apple),box-shadow .35s var(--ease-apple);box-shadow:var(--shadow-sm)}
.module-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.module-card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;transition:transform .5s var(--ease-apple)}
.module-card:hover img{transform:scale(1.04)}
.module-body{padding:20px 24px 24px}
.module-body h3{font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px}
.module-body p{font-size:14px;color:var(--text-secondary);line-height:1.5;margin:0}
.module-body .tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--accent-subtle);color:var(--accent);margin-top:10px}
@media(max-width:768px){.module-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<section class="page-header">
 <div class="container">
 <h1>产品渲染图集</h1>
 <p class="page-sub">Nexum One 神经意图外骨骼 — EEG-Sense · NeuroCore · NeuroSuit</p>
 </div>
</section>

<section class="page-section" style="padding-top:0">
 <div class="container">

 <div class="content-card" style="margin-bottom:40px">
 <h2 style="margin-top:0">完整系统</h2>
 <div style="background:var(--bg);border-radius:var(--radius);padding:12px;margin-top:24px;text-align:center">
  <svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:900px;height:auto;display:inline-block">
  <defs>
    <filter id="ss"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/></filter>
    <linearGradient id="pantsGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a1e"/><stop offset="100%" stop-color="#0d0d12"/></linearGradient>
    <linearGradient id="motorGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#d8d8e0"/><stop offset="50%" stop-color="#a0a0a8"/><stop offset="100%" stop-color="#707078"/></linearGradient>
    <marker id="arw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--accent)"/></marker>
  </defs>
  <rect width="900" height="500" rx="16" fill="var(--bg-card)"/>
  <text x="450" y="36" text-anchor="middle" fill="var(--accent)" font-size="15" font-weight="700">Nexum One 系统架构 — 从神经意图到物理动作</text>

  <!-- === PERSON === -->
  <g transform="translate(400,210)">
    <ellipse cx="0" cy="0" rx="20" ry="24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5"/>
    <path d="M -18 -4 Q 0 6 18 -4" fill="none" stroke="#1a1a1e" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-14" cy="-2" r="1.5" fill="#555"/><circle cx="-5" cy="2" r="1.5" fill="#555"/><circle cx="5" cy="2" r="1.5" fill="#555"/><circle cx="14" cy="-2" r="1.5" fill="#555"/>
    <circle cx="22" cy="-4" r="2.5" fill="#0096f0" opacity="0.9"/>
    <rect x="-6" y="22" width="12" height="10" rx="3" fill="none" stroke="var(--text-secondary)" stroke-width="1"/>
    <line x1="0" y1="32" x2="0" y2="90" stroke="var(--text-secondary)" stroke-width="1.5"/>
    <line x1="0" y1="50" x2="-20" y2="80" stroke="var(--text-secondary)" stroke-width="1"/>
    <line x1="0" y1="50" x2="20" y2="80" stroke="var(--text-secondary)" stroke-width="1"/>
    <path d="M -14 88 L -14 190 L 12 190 L 12 88 Z" fill="url(#pantsGrad)" opacity="0.9"/>
    <path d="M -12 88 L -12 190 L 14 190 L 14 88 Z" fill="url(#pantsGrad)" opacity="0.9"/>
    <rect x="-15" y="86" width="30" height="5" rx="2" fill="#252528"/>
    <ellipse cx="-18" cy="130" rx="8" ry="11" fill="url(#motorGrad)"/><ellipse cx="-18" cy="130" rx="4" ry="7" fill="#909098"/>
    <ellipse cx="18" cy="130" rx="8" ry="11" fill="url(#motorGrad)"/><ellipse cx="18" cy="130" rx="4" ry="7" fill="#909098"/>
    <rect x="-15" y="95" width="30" height="16" rx="5" fill="#3a3a45" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="-11" y="98" width="22" height="7" rx="2" fill="#0a0a14"/>
    <circle cx="12" cy="109" r="1.5" fill="#0096f0" opacity="0.8"/>
  </g>

  <!-- === EEG-Sense callout === -->
  <g transform="translate(40,80)" filter="url(#ss)">
    <rect x="0" y="0" width="200" height="80" rx="12" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="28" rx="12" fill="var(--accent-subtle)"/>
    <rect x="0" y="16" width="200" height="12" fill="var(--accent-subtle)"/>
    <text x="100" y="19" text-anchor="middle" fill="var(--accent)" font-size="13" font-weight="700">EEG-Sense 意图感知头带</text>
    <text x="100" y="48" text-anchor="middle" fill="var(--text-secondary)" font-size="11">8ch干电极 · MRCP检测</text>
    <text x="100" y="64" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">250SPS · BLE 5.2 · ~40ms</text>
  </g>
  <path d="M 240 110 Q 310 100 375 185" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arw)" opacity="0.6"/>

  <!-- === NeuroCore callout === -->
  <g transform="translate(660,60)" filter="url(#ss)">
    <rect x="0" y="0" width="210" height="80" rx="12" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
    <rect x="0" y="0" width="210" height="28" rx="12" fill="var(--accent-subtle)"/>
    <rect x="0" y="16" width="210" height="12" fill="var(--accent-subtle)"/>
    <text x="105" y="19" text-anchor="middle" fill="var(--accent)" font-size="13" font-weight="700">NeuroCore 边缘AI处理器</text>
    <text x="105" y="48" text-anchor="middle" fill="var(--text-secondary)" font-size="11">EEGNet + RL策略网络</text>
    <text x="105" y="64" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">STM32H7 · 48Wh · ~55ms</text>
  </g>
  <path d="M 420 210 Q 500 160 650 90" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="530" y="155" text-anchor="middle" fill="var(--accent)" font-size="9" font-weight="600">BLE</text>

  <!-- === NeuroSuit callout === -->
  <g transform="translate(660,320)" filter="url(#ss)">
    <rect x="0" y="0" width="210" height="80" rx="12" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
    <rect x="0" y="0" width="210" height="28" rx="12" fill="var(--accent-subtle)"/>
    <rect x="0" y="16" width="210" height="12" fill="var(--accent-subtle)"/>
    <text x="105" y="19" text-anchor="middle" fill="var(--accent)" font-size="13" font-weight="700">NeuroSuit 神经意图肌动服</text>
    <text x="105" y="48" text-anchor="middle" fill="var(--text-secondary)" font-size="11">直驱电机 · 碳纤维骨架</text>
    <text x="105" y="64" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">~2.5kg · 15Nm · ~60ms</text>
  </g>
  <path d="M 690 140 L 690 310" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arw)" opacity="0.5"/>
  <text x="700" y="230" fill="var(--accent)" font-size="9" font-weight="600">UART</text>

  <!-- === Pipeline === -->
  <g transform="translate(60,440)">
    <rect x="0" y="0" width="780" height="36" rx="18" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
    <rect x="15" y="8" width="100" height="20" rx="10" fill="var(--accent-subtle)"/>
    <text x="65" y="22" text-anchor="middle" fill="var(--accent)" font-size="11" font-weight="700">01 感知</text>
    <text x="150" y="22" fill="var(--text-tertiary)" font-size="16">→</text>
    <rect x="170" y="8" width="100" height="20" rx="10" fill="var(--accent-subtle)"/>
    <text x="220" y="22" text-anchor="middle" fill="var(--accent)" font-size="11" font-weight="700">02 翻译</text>
    <text x="310" y="22" fill="var(--text-tertiary)" font-size="16">→</text>
    <rect x="330" y="8" width="100" height="20" rx="10" fill="var(--accent-subtle)"/>
    <text x="380" y="22" text-anchor="middle" fill="var(--accent)" font-size="11" font-weight="700">03 执行</text>
    <text x="470" y="22" fill="var(--text-tertiary)" font-size="16">→</text>
    <rect x="490" y="8" width="100" height="20" rx="10" fill="var(--accent-subtle)"/>
    <text x="540" y="22" text-anchor="middle" fill="var(--accent)" font-size="11" font-weight="700">04 进化</text>
    <text x="630" y="22" fill="var(--text-secondary)" font-size="11">端到端</text>
    <text x="710" y="22" fill="var(--accent)" font-size="13" font-weight="800">~150-200ms</text>
  </g>
</svg>
 </div>
 </div>

 <div class="content-card">
 <h2 style="margin-top:0">核心模块</h2>
 <div class="module-grid" style="margin-top:24px">
 <div class="module-card">
  <img src="docs/render_1_eeg.jpg" alt="EEG-Sense头带" loading="lazy">
  <div class="module-body"><h3>EEG-Sense 意图感知头带</h3><p>8通道干电极 · 80g · 检测运动准备电位</p><span class="tag">神经接口</span></div>
 </div>
 <div class="module-card">
  <img src="docs/render_2_controlbox.jpg" alt="NeuroCore 边缘AI处理器" loading="lazy">
  <div class="module-body"><h3>NeuroCore 边缘AI处理器</h3><p>STM32H7 + nRF5340 · AI策略引擎</p><span class="tag">计算核心</span></div>
 </div>
 <div class="module-card">
  <img src="docs/render_3_neurosuit.jpg" alt="NeuroSuit" loading="lazy">
  <div class="module-body"><h3>NeuroSuit 神经意图肌动服</h3><p>碳纤维锚定 · 直驱电机 · ~2.5kg</p><span class="tag">执行系统</span></div>
 </div>
 </div>
 </div>

 </div>
</section>

<script src="shared.js"></script>
<script>
document.querySelectorAll("img").forEach(function(img){if(img.complete)img.classList.add("loaded");else img.addEventListener("load",function(){img.classList.add("loaded")})});
</script>
</body>
</html>
