<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="page-base.css">
<title>产品渲染图集 - Nexum 逐念而行</title>
<link rel="icon" href="favicon.svg">
<script>(function(){if(localStorage.getItem('nexum-theme')==='dark'){document.documentElement.setAttribute('data-theme','dark')}})();</script>
<style>
img{opacity:1!important}
.module-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.module-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .35s var(--ease-apple),box-shadow .35s var(--ease-apple);box-shadow:var(--shadow-sm)}
.module-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.module-card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;transition:transform .5s var(--ease-apple)}
.module-card:hover img{transform:scale(1.04)}
.module-body{padding:20px 24px 24px}
.module-body h3{font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px}
.module-body p{font-size:14px;color:var(--text-secondary);line-height:1.5;margin:0}
.module-body .tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--accent-subtle);color:var(--accent);margin-top:10px}
@media(max-width:768px){.module-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<section class="page-header">
 <div class="container">
 <h1>产品渲染图集</h1>
 <p class="page-sub">Nexum One 神经意图外骨骼 — EEG-Sense · NeuroCore · NeuroSuit</p>
 </div>
</section>

<section class="page-section" style="padding-top:0">
 <div class="container">

 <div class="content-card" style="margin-bottom:40px">
 <h2 style="margin-top:0">完整系统</h2>
 <div style="background:var(--bg);border-radius:var(--radius);padding:12px;margin-top:24px;text-align:center">
  <svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:900px;height:auto;display:inline-block">
  <defs>
    <filter id="ss"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.05"/></filter>
    <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a1e"/><stop offset="100%" stop-color="#0d0d12"/></linearGradient>
    <linearGradient id="motor" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#d8d8e0"/><stop offset="50%" stop-color="#a0a0a8"/><stop offset="100%" stop-color="#707078"/></linearGradient>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--accent)"/></marker>
  </defs>
  <rect width="900" height="460" rx="16" fill="var(--bg-card)"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="var(--accent)" font-size="14" font-weight="700">Nexum One 完整系统 — 从神经意图到物理动作</text>

  <!-- ===== TOP: SIGNAL FLOW PIPELINE ===== -->
  <g transform="translate(60,50)">
    <!-- Step 1: Brain/EEG -->
    <rect x="0" y="0" width="160" height="56" rx="12" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5" filter="url(#ss)"/>
    <text x="80" y="22" text-anchor="middle" fill="var(--accent)" font-size="12" font-weight="700">EEG-Sense 意图感知头带</text>
    <text x="80" y="42" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">8ch干电极 · MRCP检测 · ~40ms</text>
    <!-- Arrow -->
    <line x1="165" y1="28" x2="210" y2="28" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#ar)" opacity="0.6"/>
    <text x="187" y="20" text-anchor="middle" fill="var(--accent)" font-size="8" font-weight="600">BLE</text>

    <!-- Step 2: AI Processing -->
    <rect x="215" y="0" width="170" height="56" rx="12" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5" filter="url(#ss)"/>
    <text x="300" y="22" text-anchor="middle" fill="var(--accent)" font-size="12" font-weight="700">NeuroCore 边缘AI处理器</text>
    <text x="300" y="42" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">EEGNet推理 · RL策略 · ~55ms</text>
    <!-- Arrow -->
    <line x1="390" y1="28" x2="435" y2="28" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#ar)" opacity="0.6"/>
    <text x="412" y="20" text-anchor="middle" fill="var(--accent)" font-size="8" font-weight="600">UART</text>

    <!-- Step 3: Execution -->
    <rect x="440" y="0" width="170" height="56" rx="12" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5" filter="url(#ss)"/>
    <text x="525" y="22" text-anchor="middle" fill="var(--accent)" font-size="12" font-weight="700">NeuroSuit 神经意图肌动服</text>
    <text x="525" y="42" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">直驱电机 · 力矩输出 · ~60ms</text>

    <!-- Latency badge -->
    <rect x="640" y="8" width="90" height="40" rx="20" fill="var(--accent-subtle)"/>
    <text x="685" y="24" text-anchor="middle" fill="var(--accent)" font-size="9" font-weight="600">端到端</text>
    <text x="685" y="40" text-anchor="middle" fill="var(--accent)" font-size="15" font-weight="800">~150ms</text>
  </g>

  <!-- ===== MIDDLE: PERSON WEARING THE SYSTEM ===== -->
  <g transform="translate(265,140)">
    <!-- Head + EEG-Sense -->
    <ellipse cx="60" cy="18" rx="18" ry="22" fill="none" stroke="var(--text-secondary)" stroke-width="1.5"/>
    <!-- Headband -->
    <path d="M 42 15 Q 60 25 78 15" fill="none" stroke="#1a1a1e" stroke-width="5" stroke-linecap="round"/>
    <circle cx="48" cy="17" r="1.2" fill="#555"/><circle cx="60" cy="20" r="1.2" fill="#555"/><circle cx="72" cy="17" r="1.2" fill="#555"/>
    <circle cx="82" cy="16" r="2" fill="#0096f0" opacity="0.9"/>
    <!-- Neck -->
    <rect x="54" y="38" width="12" height="8" rx="3" fill="none" stroke="var(--text-secondary)" stroke-width="1"/>
    <!-- Torso -->
    <line x1="60" y1="46" x2="60" y2="100" stroke="var(--text-secondary)" stroke-width="1.5"/>
    <line x1="60" y1="62" x2="40" y2="85" stroke="var(--text-secondary)" stroke-width="1"/>
    <line x1="60" y1="62" x2="80" y2="85" stroke="var(--text-secondary)" stroke-width="1"/>

    <!-- NeuroSuit pants -->
    <path d="M 48 98 L 48 200 L 72 200 L 72 98 Z" fill="url(#pants)" opacity="0.9"/>
    <path d="M 50 98 L 50 200 L 73 200 L 73 98 Z" fill="url(#pants)" opacity="0.9"/>
    <rect x="47" y="96" width="26" height="4" rx="2" fill="#252528"/>
    <!-- Hip motors -->
    <ellipse cx="45" cy="140" rx="7" ry="10" fill="url(#motor)"/><ellipse cx="45" cy="140" rx="3.5" ry="6" fill="#909098"/>
    <ellipse cx="75" cy="140" rx="7" ry="10" fill="url(#motor)"/><ellipse cx="75" cy="140" rx="3.5" ry="6" fill="#909098"/>
    <!-- NeuroCore at waist -->
    <rect x="46" y="96" width="28" height="14" rx="4" fill="#3a3a45" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
    <rect x="49" y="99" width="22" height="6" rx="2" fill="#0a0a14"/>
    <circle cx="71" cy="108" r="1.2" fill="#0096f0" opacity="0.8"/>
  </g>

  <!-- Signal waves from headband (EEG reading) -->
  <g opacity="0.4">
    <path d="M 320 150 Q 325 145 330 150 Q 335 155 340 150 Q 345 145 350 150" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
    <path d="M 315 155 Q 320 148 325 155 Q 330 162 335 155 Q 340 148 345 155 Q 350 162 355 155" fill="none" stroke="var(--accent)" stroke-width="1"/>
  </g>

  <!-- Data flow annotation: EEG → BLE → NeuroCore (left side) -->
  <g transform="translate(140,165)">
    <rect x="0" y="0" width="90" height="22" rx="11" fill="var(--accent-subtle)"/>
    <text x="45" y="14" text-anchor="middle" fill="var(--accent)" font-size="9" font-weight="600">脑电信号</text>
    <line x1="90" y1="11" x2="260" y2="-40" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>
  </g>

  <!-- Data flow annotation: NeuroCore → UART → NeuroSuit (right side) -->
  <g transform="translate(400,230)">
    <rect x="0" y="0" width="90" height="22" rx="11" fill="var(--accent-subtle)"/>
    <text x="45" y="14" text-anchor="middle" fill="var(--accent)" font-size="9" font-weight="600">力矩指令</text>
  </g>

  <!-- Feedback loop arrow -->
  <path d="M 60 340 Q 200 380 400 340 Q 600 300 750 340 Q 820 360 850 340" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>
  <text x="450" y="375" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">力传感器 + IMU反馈闭环</text>
  <circle cx="60" cy="340" r="3" fill="#10b981" opacity="0.3"/>
  <circle cx="850" cy="340" r="3" fill="#10b981" opacity="0.3"/>

  <!-- ===== BOTTOM: SPECS ROW ===== -->
  <g transform="translate(60,400)">
    <rect x="0" y="0" width="780" height="40" rx="20" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" fill="var(--text-secondary)" font-size="11">8ch EEG</text>
    <line x1="180" y1="10" x2="180" y2="30" stroke="var(--border)" stroke-width="1"/>
    <text x="280" y="25" text-anchor="middle" fill="var(--text-secondary)" font-size="11">250SPS采样</text>
    <line x1="360" y1="10" x2="360" y2="30" stroke="var(--border)" stroke-width="1"/>
    <text x="460" y="25" text-anchor="middle" fill="var(--text-secondary)" font-size="11">~2.5kg总重</text>
    <line x1="540" y1="10" x2="540" y2="30" stroke="var(--border)" stroke-width="1"/>
    <text x="620" y="25" text-anchor="middle" fill="var(--text-secondary)" font-size="11">15Nm峰值扭矩</text>
    <line x1="700" y1="10" x2="700" y2="30" stroke="var(--border)" stroke-width="1"/>
    <text x="740" y="25" text-anchor="middle" fill="var(--accent)" font-size="11" font-weight="700">V1 髋部</text>
  </g>
</svg>
 </div>
 </div>

 <div class="content-card">
 <h2 style="margin-top:0">核心模块</h2>
 <div class="module-grid" style="margin-top:24px">
 <div class="module-card">
  <img src="docs/render_1_eeg.jpg" alt="EEG-Sense头带" loading="lazy">
  <div class="module-body"><h3>EEG-Sense 意图感知头带</h3><p>8通道干电极 · 80g · 检测运动准备电位</p><span class="tag">神经接口</span></div>
 </div>
 <div class="module-card">
  <img src="docs/render_2_controlbox.jpg" alt="NeuroCore 边缘AI处理器" loading="lazy">
  <div class="module-body"><h3>NeuroCore 边缘AI处理器</h3><p>STM32H7 + nRF5340 · AI策略引擎</p><span class="tag">计算核心</span></div>
 </div>
 <div class="module-card">
  <img src="docs/render_3_neurosuit.jpg" alt="NeuroSuit" loading="lazy">
  <div class="module-body"><h3>NeuroSuit 神经意图肌动服</h3><p>碳纤维锚定 · 直驱电机 · ~2.5kg</p><span class="tag">执行系统</span></div>
 </div>
 </div>
 </div>

 </div>
</section>

<script src="shared.js"></script>
<script>
document.querySelectorAll("img").forEach(function(img){if(img.complete)img.classList.add("loaded");else img.addEventListener("load",function(){img.classList.add("loaded")})});
</script>
</body>
</html>
