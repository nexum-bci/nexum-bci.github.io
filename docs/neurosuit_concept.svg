<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:600px;height:auto;display:block;margin:0 auto">
  <defs>
    <linearGradient id="fabric" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a20"/>
      <stop offset="100%" stop-color="#2a2a32"/>
    </linearGradient>
    <linearGradient id="carbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a3a42"/>
      <stop offset="50%" stop-color="#4a4a52"/>
      <stop offset="100%" stop-color="#3a3a42"/>
    </linearGradient>
    <linearGradient id="motor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d0d0d8"/>
      <stop offset="50%" stop-color="#a8a8b0"/>
      <stop offset="100%" stop-color="#787880"/>
    </linearGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" rx="24" fill="#fafafa"/>

  <!-- HUMAN FIGURE - simplified silhouette -->
  <g transform="translate(400,120)" filter="url(#soft-shadow)">
    <!-- Torso -->
    <rect x="-60" y="0" width="120" height="280" rx="30" fill="#e8e8ec"/>
    <!-- Left leg -->
    <rect x="-35" y="280" width="40" height="320" rx="15" fill="#e8e8ec"/>
    <!-- Right leg -->
    <rect x="-5" y="280" width="40" height="320" rx="15" fill="#e8e8ec"/>
    <!-- Head -->
    <circle cx="0" cy="-30" r="45" fill="#e8e8ec"/>
  </g>

  <!-- NEUROSUIT - the wearable garment -->
  <g transform="translate(400,120)" filter="url(#soft-shadow)">
    <!-- Compression fabric base (waist to mid-thigh) -->
    <rect x="-65" y="80" width="130" height="280" rx="35" fill="url(#fabric)" opacity="0.85"/>
    <!-- Left thigh fabric -->
    <rect x="-38" y="310" width="46" height="180" rx="18" fill="url(#fabric)" opacity="0.85"/>
    <!-- Right thigh fabric -->
    <rect x="-8" y="310" width="46" height="180" rx="18" fill="url(#fabric)" opacity="0.85"/>

    <!-- Fabric texture lines - subtle -->
    <g opacity="0.08" stroke="#fff" stroke-width="0.5">
      <line x1="-55" y1="120" x2="65" y2="120"/>
      <line x1="-55" y1="160" x2="65" y2="160"/>
      <line x1="-55" y1="200" x2="65" y2="200"/>
      <line x1="-55" y1="240" x2="65" y2="240"/>
      <line x1="-55" y1="280" x2="65" y2="280"/>
      <line x1="-55" y1="320" x2="65" y2="320"/>
    </g>

    <!-- LEFT HIP - Carbon fiber anchor + motor -->
    <g transform="translate(-45, 140)">
      <!-- Carbon anchor plate (on pelvis) -->
      <ellipse cx="0" cy="0" rx="28" ry="20" fill="url(#carbon)" stroke="#555" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" fill="#999" font-size="7" font-weight="600">CARBON</text>
      <!-- Motor -->
      <circle cx="0" cy="0" r="18" fill="url(#motor)" stroke="#888" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="8" fill="#666"/>
      <circle cx="0" cy="0" r="3" fill="#333"/>
      <!-- Force direction arrow -->
      <path d="M 0 20 L 0 55" stroke="#0096f0" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#arrow-blue)"/>
    </g>

    <!-- RIGHT HIP - Carbon fiber anchor + motor -->
    <g transform="translate(45, 140)">
      <ellipse cx="0" cy="0" rx="28" ry="20" fill="url(#carbon)" stroke="#555" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" fill="#999" font-size="7" font-weight="600">CARBON</text>
      <circle cx="0" cy="0" r="18" fill="url(#motor)" stroke="#888" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="8" fill="#666"/>
      <circle cx="0" cy="0" r="3" fill="#333"/>
      <path d="M 0 20 L 0 55" stroke="#0096f0" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#arrow-blue)"/>
    </g>

    <!-- Thigh straps (elastic, minimal) -->
    <ellipse cx="-15" cy="380" rx="22" ry="8" fill="none" stroke="#444" stroke-width="2" opacity="0.5"/>
    <ellipse cx="15" cy="380" rx="22" ry="8" fill="none" stroke="#444" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow-blue" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,6 3,0 6" fill="#0096f0"/>
    </marker>
  </defs>

  <!-- CALLOUTS -->
  <!-- Callout 1: Carbon anchor -->
  <g transform="translate(350,320)">
    <line x1="0" y1="0" x2="-15" y2="-140" stroke="#0096f0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#0096f0"/>
    <rect x="10" y="-22" width="180" height="44" rx="8" fill="#fff" stroke="#e5e5e5" stroke-width="1" filter="url(#subtle-shadow)"/>
    <text x="100" y="-8" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">碳纤维锚点 T700</text>
    <text x="100" y="8" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">只在髋关节处提供刚性力传递</text>
  </g>

  <!-- Callout 2: Elastic fabric -->
  <g transform="translate(300,450)">
    <line x1="0" y1="0" x2="80" y2="-250" stroke="#0096f0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#0096f0"/>
    <rect x="-40" y="-22" width="180" height="44" rx="8" fill="#fff" stroke="#e5e5e5" stroke-width="1" filter="url(#subtle-shadow)"/>
    <text x="50" y="-8" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">弹性压缩织物</text>
    <text x="50" y="8" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">贴合固定 · 分散压力</text>
  </g>

  <!-- Callout 3: Motor -->
  <g transform="translate(480,340)">
    <line x1="0" y1="0" x2="-10" y2="-180" stroke="#0096f0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#0096f0"/>
    <rect x="10" y="-22" width="180" height="44" rx="8" fill="#fff" stroke="#e5e5e5" stroke-width="1" filter="url(#subtle-shadow)"/>
    <text x="100" y="-8" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">直驱电机 260g</text>
    <text x="100" y="8" text-anchor="middle" fill="var(--text-tertiary)" font-size="10">CubeMars AKE60-8 · 12.5Nm</text>
  </g>

  <!-- Bottom specs bar -->
  <rect x="80" y="830" width="640" height="44" rx="22" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="200" y="857" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">~2.5kg</text>
  <text x="350" y="857" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">~10s 穿脱</text>
  <text x="520" y="857" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">碳纤维+弹性织物</text>
  <text x="660" y="857" text-anchor="middle" fill="#0096f0" font-size="13" font-weight="700">混合穿戴</text>
  <line x1="260" y1="840" x2="260" y2="874" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="420" y1="840" x2="420" y2="874" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="590" y1="840" x2="590" y2="874" stroke="#d0d0d0" stroke-width="1"/>
</svg>