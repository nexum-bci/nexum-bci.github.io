<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:900px;height:auto;display:block;margin:0 auto">
  <defs>
    <filter id="sys-card">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="900" height="320" rx="16" fill="var(--bg)"/>

  <!-- Module 1: EEG-Sense -->
  <g transform="translate(30,30)" filter="url(#sys-card)">
    <rect width="250" height="260" rx="14" fill="#fff" stroke="#e5e5e5" stroke-width="1.5"/>
    <!-- Head icon -->
    <g transform="translate(125,50)">
      <ellipse cx="0" cy="40" rx="45" ry="52" fill="#f0f0f5"/>
      <path d="M -45 48 Q -45 75 -25 85 Q 0 90 25 85 Q 45 75 45 48" fill="none" stroke="#0096f0" stroke-width="6"/>
      <circle cx="-35" cy="55" r="2.5" fill="#0096f0"/>
      <circle cx="-22" cy="70" r="2.5" fill="#0096f0"/>
      <circle cx="0" cy="76" r="2.5" fill="#0096f0"/>
      <circle cx="22" cy="70" r="2.5" fill="#0096f0"/>
      <circle cx="35" cy="55" r="2.5" fill="#0096f0"/>
    </g>
    <text x="125" y="180" text-anchor="middle" fill="var(--text)" font-size="15" font-weight="700">EEG-Sense</text>
    <text x="125" y="202" text-anchor="middle" fill="var(--text-tertiary)" font-size="12">意图感知头带</text>
    <text x="125" y="230" text-anchor="middle" fill="#0096f0" font-size="11" font-weight="600">神经感知层</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="285" y1="160" x2="315" y2="160" stroke="#0096f0" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="318,156 325,160 318,164" fill="#0096f0" opacity="0.5"/>
  <text x="300" y="148" text-anchor="middle" fill="var(--text-tertiary)" font-size="9">BLE</text>

  <!-- Module 2: NeuroCore -->
  <g transform="translate(335,30)" filter="url(#sys-card)">
    <rect width="230" height="260" rx="14" fill="#fff" stroke="#e5e5e5" stroke-width="1.5"/>
    <!-- Box icon -->
    <g transform="translate(115,55)">
      <rect x="-45" y="-25" width="90" height="70" rx="10" fill="#2a2a32"/>
      <rect x="-35" y="-15" width="70" height="20" rx="4" fill="#1a1a1e"/>
      <rect x="-30" y="-10" width="25" height="8" rx="2" fill="#1a3a5a" opacity="0.6"/>
      <rect x="5" y="-10" width="20" height="8" rx="2" fill="#0a2a4a" opacity="0.6"/>
      <circle cx="15" cy="15" r="8" fill="none" stroke="#0096f0" stroke-width="2"/>
    </g>
    <text x="115" y="180" text-anchor="middle" fill="var(--text)" font-size="15" font-weight="700">NeuroCore</text>
    <text x="115" y="202" text-anchor="middle" fill="var(--text-tertiary)" font-size="12">控制中枢 · STM32H7+NPU</text>
    <text x="115" y="230" text-anchor="middle" fill="#0096f0" font-size="11" font-weight="600">意图解码层</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="570" y1="160" x2="600" y2="160" stroke="#0096f0" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="603,156 610,160 603,164" fill="#0096f0" opacity="0.5"/>
  <text x="585" y="148" text-anchor="middle" fill="var(--text-tertiary)" font-size="9">UART</text>

  <!-- Module 3: NeuroSuit -->
  <g transform="translate(620,30)" filter="url(#sys-card)">
    <rect width="250" height="260" rx="14" fill="#fff" stroke="#e5e5e5" stroke-width="1.5"/>
    <!-- Suit icon -->
    <g transform="translate(125,55)">
      <rect x="-30" y="0" width="60" height="50" rx="10" fill="url(#fabric)" opacity="0.8"/>
      <rect x="-22" y="50" width="18" height="40" rx="6" fill="url(#fabric)" opacity="0.8"/>
      <rect x="4" y="50" width="18" height="40" rx="6" fill="url(#fabric)" opacity="0.8"/>
      <!-- Hip motors -->
      <ellipse cx="-20" cy="20" rx="8" ry="12" fill="#a8a8b0" stroke="#888" stroke-width="1"/>
      <ellipse cx="20" cy="20" rx="8" ry="12" fill="#a8a8b0" stroke="#888" stroke-width="1"/>
      <!-- Carbon accents -->
      <ellipse cx="-20" cy="15" rx="6" ry="4" fill="#4a4a52"/>
      <ellipse cx="20" cy="15" rx="6" ry="4" fill="#4a4a52"/>
    </g>
    <text x="125" y="180" text-anchor="middle" fill="var(--text)" font-size="15" font-weight="700">NeuroSuit</text>
    <text x="125" y="202" text-anchor="middle" fill="var(--text-tertiary)" font-size="12">神经意图肌动服</text>
    <text x="125" y="230" text-anchor="middle" fill="#0096f0" font-size="11" font-weight="600">力控执行层</text>
  </g>

  <!-- Feedback arrow -->
  <path d="M 745 250 Q 745 290 450 290 Q 125 290 125 250" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.3"/>
  <text x="435" y="305" text-anchor="middle" fill="#10b981" font-size="9" font-weight="600" opacity="0.5">力传感器 + IMU 闭环反馈</text>
</svg>