<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:500px;height:auto;display:block;margin:0 auto">
  <defs>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0f0f5"/>
      <stop offset="50%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f5"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="600" height="500" rx="20" fill="#fafafa"/>

  <!-- Head silhouette -->
  <g transform="translate(300,60)">
    <!-- Head outline -->
    <ellipse cx="0" cy="100" rx="70" ry="85" fill="#e8e8ec" stroke="#ddd" stroke-width="1.5"/>
    <!-- Neck -->
    <rect x="-18" y="180" width="36" height="40" rx="8" fill="#e8e8ec"/>
    <!-- Shoulders hint -->
    <path d="M -120 220 Q -60 200 0 220 Q 60 200 120 220" fill="none" stroke="#e8e8ec" stroke-width="2"/>

    <!-- EEG Headband -->
    <path d="M -68 60 Q -70 110 -55 150 Q -40 175 0 180 Q 40 175 55 150 Q 70 110 68 60" fill="none" stroke="url(#band)" stroke-width="14" filter="url(#card-shadow)"/>
    <path d="M -68 60 Q -70 110 -55 150 Q -40 175 0 180 Q 40 175 55 150 Q 70 110 68 60" fill="none" stroke="#ddd" stroke-width="1" opacity="0.5"/>

    <!-- Electrode positions (8 channels) -->
    <g>
      <circle cx="-55" cy="105" r="4" fill="#0096f0"/>
      <circle cx="-40" cy="135" r="4" fill="#0096f0"/>
      <circle cx="-20" cy="155" r="4" fill="#0096f0"/>
      <circle cx="0" cy="165" r="4" fill="#0096f0"/>
      <circle cx="20" cy="155" r="4" fill="#0096f0"/>
      <circle cx="40" cy="135" r="4" fill="#0096f0"/>
      <circle cx="55" cy="105" r="4" fill="#0096f0"/>
      <circle cx="0" cy="100" r="4" fill="#0096f0"/>
    </g>

    <!-- LED indicator -->
    <circle cx="-65" cy="65" r="2.5" fill="#10b981"/>
  </g>

  <!-- Specs -->
  <g transform="translate(0,380)">
    <rect x="80" y="0" width="440" height="80" rx="12" fill="#fff" stroke="#e5e5e5" stroke-width="1" filter="url(#card-shadow)"/>
    <g>
      <text x="140" y="32" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="700">8ch</text>
      <text x="140" y="52" text-anchor="middle" fill="var(--text-tertiary)" font-size="11">干电极</text>
      <line x1="200" y1="16" x2="200" y2="64" stroke="#e0e0e0" stroke-width="1"/>

      <text x="260" y="32" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="700">80g</text>
      <text x="260" y="52" text-anchor="middle" fill="var(--text-tertiary)" font-size="11">总重</text>
      <line x1="320" y1="16" x2="320" y2="64" stroke="#e0e0e0" stroke-width="1"/>

      <text x="380" y="32" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="700">250 SPS</text>
      <text x="380" y="52" text-anchor="middle" fill="var(--text-tertiary)" font-size="11">采样率</text>
      <line x1="440" y1="16" x2="440" y2="64" stroke="#e0e0e0" stroke-width="1"/>

      <text x="500" y="32" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="700">BLE 5.2</text>
      <text x="500" y="52" text-anchor="middle" fill="var(--text-tertiary)" font-size="11">无线传输</text>
    </g>
  </g>
</svg>