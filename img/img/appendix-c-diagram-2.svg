<svg viewBox="0 0 900 500" style="max-width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#0096f0"/></marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#0096f0"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#000000"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="500" rx="12" fill="#f8fafc" stroke="#e5e5e5" stroke-width="1"/>
  <text x="450" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#000000">硬件系统框图：腰带集中供电 · 双膝独立执行 · 四功能全支持</text>
  
  <!-- Belt Zone -->
  <rect x="50" y="50" width="800" height="100" rx="8" fill="#fff" stroke="#0096f0" stroke-width="1.5"/>
  <text x="450" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#0096f0">腰带单元（后腰·重量~300g）</text>
  
  <!-- Battery -->
  <rect x="80" y="85" width="180" height="50" rx="6" fill="#e8f4fd" stroke="#0096f0" stroke-width="1"/>
  <text x="170" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#0096f0">电池 18650 4S1P</text>
  <text x="170" y="124" text-anchor="middle" font-size="9" fill="#000000">14.8V · 3000mAh · 2-3h续航</text>
  
  <!-- Main Controller -->
  <rect x="290" y="85" width="200" height="50" rx="6" fill="#e8f4fd" stroke="#0096f0" stroke-width="1"/>
  <text x="390" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#0096f0">主控 STM32</text>
  <text x="390" y="122" text-anchor="middle" font-size="9" fill="#000000">电机驱动·IMU处理·蓝牙·安全监控</text>
  
  <!-- Sensors on belt -->
  <rect x="520" y="85" width="140" height="50" rx="6" fill="#e8f4fd" stroke="#0096f0" stroke-width="1"/>
  <text x="590" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#0096f0">腰带IMU</text>
  <text x="590" y="124" text-anchor="middle" font-size="9" fill="#000000">姿态检测·跌倒识别</text>
  
  <!-- Belt extras -->
  <rect x="690" y="85" width="130" height="50" rx="6" fill="#e8f4fd" stroke="#0096f0" stroke-width="1"/>
  <text x="755" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#0096f0">压阻式传感器</text>
  <text x="755" y="124" text-anchor="middle" font-size="9" fill="#000000">肌肉激活监测</text>
  
  <!-- Connection lines: belt → knees -->
  <line x1="170" y1="150" x2="170" y2="180" stroke="#0096f0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="390" y1="150" x2="390" y2="180" stroke="#0096f0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="280" y="170" text-anchor="middle" font-size="8" fill="#0096f0">屏蔽线缆 · 防水连接器 · IP54</text>
  
  <!-- Left Knee -->
  <rect x="50" y="190" width="400" height="140" rx="8" fill="#fff" stroke="#0096f0" stroke-width="1"/>
  <text x="250" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#0096f0">左膝单元（~450g）</text>
  
  <rect x="70" y="225" width="170" height="45" rx="5" fill="#f0fdf4" stroke="#000000" stroke-width="1"/>
  <text x="155" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#000000">电机 CubeMars GL40</text>
  <text x="155" y="260" text-anchor="middle" font-size="8" fill="#000000">~250g · 助力/训练/舒缓三模式</text>
  
  <rect x="260" y="225" width="170" height="45" rx="5" fill="#f0fdf4" stroke="#000000" stroke-width="1"/>
  <text x="345" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#000000">减速器 5:1行星</text>
  <text x="345" y="260" text-anchor="middle" font-size="8" fill="#000000">~150g · 量产后谐波方案</text>
  
  <rect x="70" y="280" width="170" height="35" rx="5" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <text x="155" y="301" text-anchor="middle" font-size="9" fill="#000000">电磁离合器 · 断电脱开零阻力</text>
  <rect x="260" y="280" width="170" height="35" rx="5" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <text x="345" y="301" text-anchor="middle" font-size="9" fill="#000000">IMU+力传感器 · 实时步态检测</text>
  
  <!-- Right Knee -->
  <rect x="470" y="190" width="400" height="140" rx="8" fill="#fff" stroke="#0096f0" stroke-width="1"/>
  <text x="670" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#0096f0">右膝单元（~450g）· 镜像对称</text>
  <text x="670" y="260" text-anchor="middle" font-size="9" fill="#000000">与左膝相同配置</text>
  <text x="670" y="300" text-anchor="middle" font-size="9" fill="#000000">双膝IMU同步 · 步态对称性监测</text>
  
  <!-- Bottom: Four-function mapping -->
  <rect x="50" y="350" width="800" height="65" rx="8" fill="#f0f4f3" stroke="#e5e5e5" stroke-width="1"/>
  <text x="450" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#000000">四种模式由同一套硬件支持 · 纯软件切换 · 零硬件增量</text>
  
  <rect x="70" y="382" width="175" height="24" rx="4" fill="#0096f0" opacity="0.85"/>
  <text x="157" y="398" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">助力：正向力矩 · KAM减少>20%</text>
  
  <rect x="260" y="382" width="175" height="24" rx="4" fill="#000000" opacity="0.85"/>
  <text x="347" y="398" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">训练：反向力矩 · 股四头肌强化</text>
  
  <rect x="450" y="382" width="175" height="24" rx="4" fill="#0096f0" opacity="0.85"/>
  <text x="537" y="398" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">舒缓：低频振动 · 肌肉放松</text>
  
  <rect x="640" y="382" width="175" height="24" rx="4" fill="#6b7280" opacity="0.85"/>
  <text x="727" y="398" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">洞察：传感器+416模型推断</text>
  
  <!-- Weight summary -->
  <rect x="50" y="430" width="800" height="55" rx="8" fill="#0096f0" opacity="0.08" stroke="#0096f0" stroke-width="1"/>
  <text x="450" y="452" text-anchor="middle" font-size="11" font-weight="700" fill="#0096f0">Gen 1总重：腰带300g + 左膝450g + 右膝450g + 碳纤维框架800g + 绑带200g = ~2,200g（约2.2kg）</text>
  <text x="450" y="474" text-anchor="middle" font-size="9" fill="#000000">对比：DNSYS Z1 3.2kg（双膝·电池在腿）｜ 远也PowerKnee ~3kg/腿 ｜ Skip MO/GO ~2kg（仅单功能·户外）</text>
</svg>