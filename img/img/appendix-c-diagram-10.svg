<svg viewBox="0 0 1200 680" style="max-width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1200" height="680" rx="12" fill="#f8fafc" stroke="#0096f0" stroke-width="2"/>
  <text x="600" y="30" text-anchor="middle" font-size="15" font-weight="800" fill="#0096f0">Bones膝安 Gen 1 推荐工程设计总图（基于12流派分析·不考虑价格约束）</text>

  <!-- WAIST -->
  <rect x="400" y="50" width="400" height="60" rx="8" fill="#0096f0" opacity="0.8"/>
  <text x="600" y="73" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">腰带：电池(2×4S1P 50E热插拔·310g×2) + 主控(STM32G474+ESP32-S3) + DCDC</text>
  <text x="600" y="94" text-anchor="middle" font-size="8" fill="#fff">铝合金+碳纤维框架·快拆磁吸电池仓·IP54防水·USB-C PD充电</text>

  <!-- Belt details -->
  <rect x="40" y="45" width="180" height="55" rx="6" fill="#fff" stroke="#0096f0" stroke-width="1"/>
  <text x="130" y="65" text-anchor="middle" font-size="8" font-weight="700" fill="#0096f0">电池模块</text>
  <text x="130" y="82" text-anchor="middle" font-size="7" fill="#000">Samsung INR21700-50E ×4S1P</text>
  <text x="130" y="96" text-anchor="middle" font-size="7" fill="#666">14.8V·5Ah·72Wh·310g·可换电</text>
  <line x1="220" y1="75" x2="400" y2="75" stroke="#0096f0" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="40" y="110" width="180" height="45" rx="6" fill="#fff" stroke="#0096f0" stroke-width="1"/>
  <text x="130" y="130" text-anchor="middle" font-size="8" font-weight="700" fill="#0096f0">主控+传感器中枢</text>
  <text x="130" y="148" text-anchor="middle" font-size="7" fill="#666">STM32G474·ESP32-S3·BLE5.2·CAN</text>

  <!-- Cables down -->
  <line x1="520" y1="110" x2="350" y2="180" stroke="#0096f0" stroke-width="2.5"/>
  <line x1="680" y1="110" x2="850" y2="180" stroke="#0096f0" stroke-width="2.5"/>
  <text x="340" y="155" font-size="7" fill="#0096f0">屏蔽线缆</text>
  <text x="830" y="155" font-size="7" fill="#0096f0">屏蔽线缆</text>

  <!-- LEFT KNEE -->
  <rect x="240" y="185" width="220" height="190" rx="8" fill="#fff" stroke="#0096f0" stroke-width="2"/>
  <text x="350" y="208" text-anchor="middle" font-size="9" font-weight="700" fill="#0096f0">左膝单元</text>
  <circle cx="350" cy="240" r="22" fill="#0096f0" opacity="0.6"/>
  <text x="350" y="244" text-anchor="middle" font-size="7" fill="#fff">AK80-9 V3.0</text>
  <text x="350" y="272" text-anchor="middle" font-size="7" fill="#000">480g·22Nm峰值·9Nm额定·9:1行星</text>
  <text x="350" y="290" text-anchor="middle" font-size="7" fill="#000">内置16-bit磁编码器+FOC驱动</text>
  <rect x="270" y="302" width="160" height="16" rx="3" fill="#0096f0" opacity="0.3"/>
  <text x="350" y="313" text-anchor="middle" font-size="6" fill="#000">Ogura MCNB-3Z 电磁离合器·50g·断电脱开</text>
  <rect x="270" y="324" width="160" height="14" rx="3" fill="none" stroke="#0096f0" stroke-width="1"/>
  <text x="350" y="334" text-anchor="middle" font-size="6" fill="#0096f0">ICM-42688-P IMU + AS5048A编码器</text>
  <text x="350" y="358" text-anchor="middle" font-size="7" fill="#666">膝部总重~680g(含电机+减速器+传感器+框架)</text>

  <!-- RIGHT KNEE -->
  <rect x="740" y="185" width="220" height="190" rx="8" fill="#fff" stroke="#0096f0" stroke-width="2"/>
  <text x="850" y="208" text-anchor="middle" font-size="9" font-weight="700" fill="#0096f0">右膝单元</text>
  <circle cx="850" cy="240" r="22" fill="#0096f0" opacity="0.6"/>
  <text x="850" y="244" text-anchor="middle" font-size="7" fill="#fff">AK80-9 V3.0</text>
  <text x="850" y="272" text-anchor="middle" font-size="7" fill="#000">同左侧·对称配置</text>

  <!-- FRAME + STRAPS -->
  <rect x="240" y="385" width="220" height="50" rx="6" fill="#e8f4fd"/>
  <text x="350" y="405" text-anchor="middle" font-size="7" fill="#000">T700碳纤维大腿+小腿连杆·工字梁18×12mm·250mm+200mm</text>
  <text x="350" y="422" text-anchor="middle" font-size="7" fill="#000">7075-T6 CNC膝关节座·角接触轴承6804ZZ×4·绑带(60mm大腿+50mm小腿)</text>

  <rect x="740" y="385" width="220" height="50" rx="6" fill="#e8f4fd"/>
  <text x="850" y="405" text-anchor="middle" font-size="7" fill="#000">对称配置·磁吸Fidlock快拆扣具·3秒拆10秒穿</text>

  <!-- WEIGHT BUDGET -->
  <rect x="40" y="450" width="1120" height="100" rx="8" fill="#fff" stroke="#e5e5e5"/>
  <text x="600" y="472" text-anchor="middle" font-size="10" font-weight="700" fill="#000">Gen 1 双膝系统重量预算（每克可追溯）</text>
  <text x="60" y="495" font-size="8" fill="#000">腰带(电池310+主控120+DCDC30+框架180): <tspan font-weight="700">640g</tspan></text>
  <text x="500" y="495" font-size="8" fill="#000">左膝电机480g</text><text x="700" y="495" font-size="8" fill="#000">右膝电机480g</text>
  <text x="60" y="515" font-size="8" fill="#000">碳纤维连杆(大腿90+小腿70): <tspan font-weight="700">160g</tspan></text>
  <text x="500" y="515" font-size="8" fill="#000">膝关节座(76g×2)+轴承(52g)</text><text x="700" y="515" font-size="8" fill="#000">离合器(50g×2)+绑带(200g)+扣具线缆(117g)</text>
  <text x="60" y="540" font-size="9" font-weight="700" fill="#0096f0">系统总重: 640 + 480 + 480 + 160 + 128 + 52 + 100 + 200 + 117 = ~2,357g（约2.4kg）</text>
  <text x="60" y="555" font-size="7" fill="#666">对比: 远也PowKnee ~6kg(双膝·3kg/腿)·DNSYS Z1 ~3.2kg(双膝·电池在腿)·Skip MO/GO 3.2kg(系统) · Bones ~2.4kg(双膝+腰带) — 在提供22Nm峰值力矩的同时最轻</text>

  <!-- SAFETY -->
  <rect x="40" y="560" width="1120" height="110" rx="8" fill="#fdf2f8" stroke="#c45a5a" stroke-width="1"/>
  <text x="600" y="582" text-anchor="middle" font-size="9" font-weight="700" fill="#c45a5a">安全系统（三重冗余·任何单点故障→零助力）</text>
  <text x="60" y="602" font-size="7" fill="#000">① 电磁离合器(Ogura MCNB-3Z·弹簧复位型·50g·<30ms脱开) 安装于减速器输出侧 — 即使减速器卡死，膝关节仍可自由活动</text>
  <text x="60" y="620" font-size="7" fill="#000">② 双MCU架构(主控STM32G474 + 安全监控STM32G030) + 独立硬件窗口看门狗(TPS3850·55ms窗口) + 急停按钮(腰带×2·IP65·<30ms响应)</text>
  <text x="60" y="638" font-size="7" fill="#000">③ 电池二级保护(BQ76905+BQ40Z50) + 每电芯独立PTC保险丝 + UL94 V-0阻燃外壳 + 跌倒检测(IMU加速度<0.4g或>3.0g→离合器断电)</text>
  <text x="60" y="656" font-size="7" fill="#666">安全设计理念：弹簧复位离合器是物理最后的防线。即使所有电子系统全部失效，弹簧仍能保证膝关节自由活动。这是所有流派中唯一能做到"电气全毁仍安全"的设计。</text>
</svg>