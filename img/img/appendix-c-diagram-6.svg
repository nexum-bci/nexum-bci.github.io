<svg viewBox="0 0 1200 520" style="max-width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1200" height="520" rx="12" fill="#f8fafc" stroke="#e5e5e5" stroke-width="1"/>
  <text x="600" y="30" text-anchor="middle" font-size="14" font-weight="800" fill="#000">从用户痛点→生物力学需求→工程参数→Bones应对方案</text>

  <!-- Headers -->
  <rect x="15" y="45" width="180" height="22" rx="3" fill="#0096f0"/><text x="105" y="60" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">日常场景</text>
  <rect x="200" y="45" width="100" height="22" rx="3" fill="#0096f0"/><text x="250" y="60" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">频率</text>
  <rect x="305" y="45" width="150" height="22" rx="3" fill="#0096f0"/><text x="380" y="60" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">膝力矩需求</text>
  <rect x="460" y="45" width="130" height="22" rx="3" fill="#0096f0"/><text x="525" y="60" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Bones工程参数</text>
  <rect x="595" y="45" width="130" height="22" rx="3" fill="#0096f0"/><text x="660" y="60" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">控制模式</text>
  <rect x="730" y="45" width="130" height="22" rx="3" fill="#0096f0"/><text x="795" y="60" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">噪音上限</text>
  <rect x="865" y="45" width="100" height="22" rx="3" fill="#0096f0"/><text x="915" y="60" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">续航需求</text>
  <rect x="970" y="45" width="110" height="22" rx="3" fill="#0096f0"/><text x="1025" y="60" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">安全优先</text>
  <rect x="1085" y="45" width="100" height="22" rx="3" fill="#0096f0"/><text x="1135" y="60" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">设计约束</text>

  <!-- Row 1: Flat walking -->
  <rect x="15" y="72" width="180" height="18" rx="2" fill="#e8f4fd"/><text x="105" y="84" text-anchor="middle" font-size="7" fill="#000">①平地行走 3000-6000步/天</text>
  <text x="250" y="84" text-anchor="middle" font-size="7" fill="#666">每天</text>
  <text x="380" y="84" text-anchor="middle" font-size="7" fill="#000">KAM 0.26-0.59Nm/kg</text>
  <text x="525" y="84" text-anchor="middle" font-size="7" fill="#0096f0">支撑相8-15Nm助力</text>
  <text x="660" y="84" text-anchor="middle" font-size="7" fill="#666">助力模式</text>
  <text x="795" y="84" text-anchor="middle" font-size="7" fill="#666"><30dB</text>
  <text x="915" y="84" text-anchor="middle" font-size="7" fill="#666">4h+</text>
  <text x="1025" y="84" text-anchor="middle" font-size="7" fill="#666">跌倒检测</text>
  <text x="1135" y="84" text-anchor="middle" font-size="7" fill="#666">稳定·平滑</text>

  <!-- Row 2: Stairs -->
  <rect x="15" y="94" width="180" height="18" rx="2" fill="#fff"/><text x="105" y="106" text-anchor="middle" font-size="7" fill="#000">②上下楼梯 4-8次/天</text>
  <text x="250" y="106" text-anchor="middle" font-size="7" fill="#666">每天</text>
  <text x="380" y="106" text-anchor="middle" font-size="7" fill="#000">下楼KAM峰值最高</text>
  <text x="525" y="106" text-anchor="middle" font-size="7" fill="#0096f0">支撑相15-25Nm助力+制动</text>
  <text x="660" y="106" text-anchor="middle" font-size="7" fill="#666">助力+制动</text>
  <text x="795" y="106" text-anchor="middle" font-size="7" fill="#666"><30dB</text>
  <text x="915" y="106" text-anchor="middle" font-size="7" fill="#666">4h+</text>
  <text x="1025" y="106" text-anchor="middle" font-size="7" fill="#c45a5a">防坠落</text>
  <text x="1135" y="106" text-anchor="middle" font-size="7" fill="#666">下楼60%冲击↓</text>

  <!-- Row 3: Sit-Stand -->
  <rect x="15" y="116" width="180" height="18" rx="2" fill="#e8f4fd"/><text x="105" y="128" text-anchor="middle" font-size="7" fill="#000">③坐-站转换 20-40次/天</text>
  <text x="250" y="128" text-anchor="middle" font-size="7" fill="#666">高频</text>
  <text x="380" y="128" text-anchor="middle" font-size="7" fill="#000">2.02Nm/kg(健康)·OA降至0.6</text>
  <text x="525" y="128" text-anchor="middle" font-size="7" fill="#0096f0">20-30Nm峰值·低速大扭矩</text>
  <text x="660" y="128" text-anchor="middle" font-size="7" fill="#666">STS模式</text>
  <text x="795" y="128" text-anchor="middle" font-size="7" fill="#666"><20dB</text>
  <text x="915" y="128" text-anchor="middle" font-size="7" fill="#666">N/A(瞬时)</text>
  <text x="1025" y="128" text-anchor="middle" font-size="7" fill="#c45a5a">防失衡</text>
  <text x="1135" y="128" text-anchor="middle" font-size="7" fill="#666">起立辅助关键</text>

  <!-- Row 4: Squat -->
  <rect x="15" y="138" width="180" height="18" rx="2" fill="#fff"/><text x="105" y="150" text-anchor="middle" font-size="7" fill="#000">④蹲下/蹲便器 3-6次/天</text>
  <text x="250" y="150" text-anchor="middle" font-size="7" fill="#666">中国独有</text>
  <text x="380" y="150" text-anchor="middle" font-size="7" fill="#000">~8倍体重压缩力</text>
  <text x="525" y="150" text-anchor="middle" font-size="7" fill="#0096f0">深蹲辅助>60°助力+起立</text>
  <text x="660" y="150" text-anchor="middle" font-size="7" fill="#666">深蹲模式</text>
  <text x="795" y="150" text-anchor="middle" font-size="7" fill="#666"><25dB</text>
  <text x="915" y="150" text-anchor="middle" font-size="7" fill="#666">N/A</text>
  <text x="1025" y="150" text-anchor="middle" font-size="7" fill="#c45a5a">起立失败风险</text>
  <text x="1135" y="150" text-anchor="middle" font-size="7" fill="#666">中国独有·关键场景</text>

  <!-- Row 5: Slope -->
  <rect x="15" y="160" width="180" height="18" rx="2" fill="#e8f4fd"/><text x="105" y="172" text-anchor="middle" font-size="7" fill="#000">⑤上下坡 1-2次/天</text>
  <text x="250" y="172" text-anchor="middle" font-size="7" fill="#666">偶尔</text>
  <text x="380" y="172" text-anchor="middle" font-size="7" fill="#000">上坡+10-15%·下坡压缩↑</text>
  <text x="525" y="172" text-anchor="middle" font-size="7" fill="#0096f0">自适应坡度检测+力矩调整</text>
  <text x="660" y="172" text-anchor="middle" font-size="7" fill="#666">坡度模式</text>
  <text x="795" y="172" text-anchor="middle" font-size="7" fill="#666"><30dB</text>
  <text x="915" y="172" text-anchor="middle" font-size="7" fill="#666">4h+</text>
  <text x="1025" y="172" text-anchor="middle" font-size="7" fill="#666">滑倒检测</text>
  <text x="1135" y="172" text-anchor="middle" font-size="7" fill="#666">再生制动回收</text>

  <!-- Row 6-10 compressed -->
  <rect x="15" y="182" width="180" height="14" rx="2" fill="#fff"/><text x="105" y="192" text-anchor="middle" font-size="6" fill="#000">⑥站立/排队 ⑦广场舞 ⑧雨天 ⑨夜起 ⑩负重</text>
  <text x="250" y="192" text-anchor="middle" font-size="6" fill="#666">日常</text>
  <text x="380" y="192" text-anchor="middle" font-size="6" fill="#000">5-30%体重持续/动态/湿滑/僵硬/额外20-30%</text>
  <text x="525" y="192" text-anchor="middle" font-size="6" fill="#0096f0">多模式自适应切换·IP54防水·快穿<60s·负重检测</text>
  <text x="660" y="192" text-anchor="middle" font-size="6" fill="#666">多模式</text>
  <text x="795" y="192" text-anchor="middle" font-size="6" fill="#666"><25dB(安静)</text>
  <text x="915" y="192" text-anchor="middle" font-size="6" fill="#666">6h+</text>
  <text x="1025" y="192" text-anchor="middle" font-size="6" fill="#666">IP54·快拆</text>
  <text x="1135" y="192" text-anchor="middle" font-size="6" fill="#666">全天候适应</text>

  <!-- Design spec summary -->
  <rect x="15" y="210" width="1170" height="110" rx="8" fill="#0096f0" opacity="0.06" stroke="#0096f0" stroke-width="1.5"/>
  <text x="600" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#0096f0">设计输入参数汇总（从用户研究推导）</text>

  <rect x="30" y="245" width="140" height="65" rx="4" fill="#fff"/><text x="100" y="265" text-anchor="middle" font-size="7" font-weight="700" fill="#000">单侧重量</text><text x="100" y="285" text-anchor="middle" font-size="9" font-weight="700" fill="#0096f0"><1.0kg</text><text x="100" y="300" text-anchor="middle" font-size="6" fill="#666">含电池·肌少症老人</text>
  <rect x="180" y="245" width="110" height="65" rx="4" fill="#fff"/><text x="235" y="265" text-anchor="middle" font-size="7" font-weight="700" fill="#000">穿戴时间</text><text x="235" y="285" text-anchor="middle" font-size="9" font-weight="700" fill="#0096f0"><60秒</text><text x="235" y="300" text-anchor="middle" font-size="6" fill="#666">磁吸快拆·手指灵活↓</text>
  <rect x="300" y="245" width="110" height="65" rx="4" fill="#fff"/><text x="355" y="265" text-anchor="middle" font-size="7" font-weight="700" fill="#000">工作噪音</text><text x="355" y="285" text-anchor="middle" font-size="9" font-weight="700" fill="#0096f0"><25dB</text><text x="355" y="300" text-anchor="middle" font-size="6" fill="#666">安静·晨练场景</text>
  <rect x="420" y="245" width="130" height="65" rx="4" fill="#fff"/><text x="485" y="265" text-anchor="middle" font-size="7" font-weight="700" fill="#000">峰值力矩</text><text x="485" y="285" text-anchor="middle" font-size="9" font-weight="700" fill="#0096f0">25-30Nm</text><text x="485" y="300" text-anchor="middle" font-size="6" fill="#666">STS+上楼梯场景</text>
  <rect x="560" y="245" width="110" height="65" rx="4" fill="#fff"/><text x="615" y="265" text-anchor="middle" font-size="7" font-weight="700" fill="#000">续航</text><text x="615" y="285" text-anchor="middle" font-size="9" font-weight="700" fill="#0096f0">>6h</text><text x="615" y="300" text-anchor="middle" font-size="6" fill="#666">热插拔·全天使用</text>
  <rect x="680" y="245" width="110" height="65" rx="4" fill="#fff"/><text x="735" y="265" text-anchor="middle" font-size="7" font-weight="700" fill="#000">充电</text><text x="735" y="285" text-anchor="middle" font-size="9" font-weight="700" fill="#0096f0">USB-C</text><text x="735" y="300" text-anchor="middle" font-size="6" fill="#666">通用接口·2h满充</text>
  <rect x="800" y="245" width="110" height="65" rx="4" fill="#fff"/><text x="855" y="265" text-anchor="middle" font-size="7" font-weight="700" fill="#000">防护等级</text><text x="855" y="285" text-anchor="middle" font-size="9" font-weight="700" fill="#0096f0">IP54</text><text x="855" y="300" text-anchor="middle" font-size="6" fill="#666">防溅水·雨天可用</text>
  <rect x="920" y="245" width="130" height="65" rx="4" fill="#fff"/><text x="985" y="265" text-anchor="middle" font-size="7" font-weight="700" fill="#000">外观</text><text x="985" y="285" text-anchor="middle" font-size="9" font-weight="700" fill="#0096f0">运动护膝</text><text x="985" y="300" text-anchor="middle" font-size="6" fill="#666">黑/灰·哑光·非医疗</text>
  <rect x="1060" y="245" width="110" height="65" rx="4" fill="#fff"/><text x="1115" y="265" text-anchor="middle" font-size="7" font-weight="700" fill="#000">沟通语言</text><text x="1115" y="285" text-anchor="middle" font-size="9" font-weight="700" fill="#0096f0">"智能护膝"</text><text x="1115" y="300" text-anchor="middle" font-size="6" fill="#666">避免"外骨骼"</text>

  <!-- User profile -->
  <text x="600" y="335" text-anchor="middle" font-size="8" fill="#666">目标用户：中国60-80岁膝OA(K-L 1-3级)·女性为主(患病率33.9%vs男20.5%)·大腿围40-62cm·小腿围32-43cm·体重50-80kg·身高155-175cm</text>
  <text x="600" y="352" text-anchor="middle" font-size="8" fill="#666">子女购买为主力(¥3,000-8,000舒适区间·孝心经济)·"智能护膝"接受度>>"外骨骼"·线下体验必需(退货率80%+)·忌医疗化外观·忌超过25dB·忌复杂操作</text>
</svg>