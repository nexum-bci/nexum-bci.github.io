<svg viewBox="0 0 900 340" style="max-width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="900" height="340" rx="12" fill="#f8fafc" stroke="#e5e5e5" stroke-width="1"/>
  <text x="450" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#000000">外骨骼架构对比：Omega · Pi · 膝关节铰链</text>
  
  <!-- Omega Architecture -->
  <rect x="20" y="44" width="275" height="280" rx="8" fill="#fff" stroke="#e5e5e5" filter="url(#shadow)"/>
  <rect x="20" y="44" width="275" height="32" rx="8" fill="#e5e5e5"/>
  <rect x="20" y="60" width="275" height="16" fill="#e5e5e5"/>
  <text x="157" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#000000">Omega 架构（极壳Hypershell）</text>
  
  <!-- Omega: hip joint -->
  <circle cx="157" cy="130" r="22" fill="none" stroke="#999" stroke-width="2"/>
  <text x="157" y="134" text-anchor="middle" font-size="9" fill="#c45a5a">髋关节</text>
  <line x1="157" y1="152" x2="157" y2="200" stroke="#999" stroke-width="2"/>
  <!-- Arrow showing swing phase -->
  <text x="230" y="125" font-size="9" fill="#c45a5a">摆动相助力</text>
  <!-- No knee actuator -->
  <text x="157" y="230" text-anchor="middle" font-size="10" fill="#c45a5a">✗ 无膝关节执行器</text>
  <text x="157" y="250" text-anchor="middle" font-size="9" fill="#c45a5a">腰帯+大腿绑带</text>
  <text x="157" y="268" text-anchor="middle" font-size="9" fill="#c45a5a">单电机·皮带驱动</text>
  <text x="157" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#c45a5a">膝OA老人：不适合</text>
  
  <!-- Pi Architecture -->
  <rect x="312" y="44" width="275" height="280" rx="8" fill="#fff" stroke="#e5e5e5" filter="url(#shadow)"/>
  <rect x="312" y="44" width="275" height="32" rx="8" fill="#e8f4fd"/>
  <rect x="312" y="60" width="275" height="16" fill="#e8f4fd"/>
  <text x="449" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#0096f0">Pi 架构（Skip MO/GO）</text>
  
  <!-- Pi: pants + knee actuator -->
  <rect x="380" y="100" width="140" height="160" rx="4" fill="none" stroke="#0096f0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="450" y="270" text-anchor="middle" font-size="9" fill="#0096f0">裤子承载平台</text>
  <circle cx="449" cy="180" r="16" fill="none" stroke="#0096f0" stroke-width="2"/>
  <text x="449" y="183" text-anchor="middle" font-size="8" fill="#0096f0">膝电机</text>
  <text x="449" y="215" text-anchor="middle" font-size="10" fill="#0096f0">✓ 膝关节执行器</text>
  <text x="449" y="235" text-anchor="middle" font-size="9" fill="#0096f0">磁力致动器</text>
  <text x="449" y="253" text-anchor="middle" font-size="9" fill="#0096f0">10个裤子尺码</text>
  <text x="449" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#000">技术可行·$5,000·不做老人</text>
  
  <!-- Hinge Architecture (Bones) -->
  <rect x="605" y="44" width="275" height="280" rx="8" fill="#fff" stroke="#0096f0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="605" y="44" width="275" height="32" rx="8" fill="#0096f0"/>
  <rect x="605" y="60" width="275" height="16" fill="#0096f0"/>
  <text x="742" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">膝关节铰链架构（Bones膝安）★</text>
  
  <!-- Bones: belt + dual knee -->
  <rect x="690" y="95" width="105" height="24" rx="4" fill="#0096f0" opacity="0.9"/>
  <text x="742" y="111" text-anchor="middle" font-size="9" fill="#fff">腰带·电池·主控</text>
  <line x1="715" y1="119" x2="715" y2="145" stroke="#0096f0" stroke-width="1.5"/>
  <line x1="770" y1="119" x2="770" y2="145" stroke="#0096f0" stroke-width="1.5"/>
  <circle cx="715" cy="165" r="14" fill="#0096f0" opacity="0.8"/>
  <text x="715" y="168" text-anchor="middle" font-size="7" fill="#fff">左膝</text>
  <circle cx="770" cy="165" r="14" fill="#0096f0" opacity="0.8"/>
  <text x="770" y="168" text-anchor="middle" font-size="7" fill="#fff">右膝</text>
  <!-- Frame -->
  <line x1="715" y1="179" x2="715" y2="230" stroke="#0096f0" stroke-width="1"/>
  <line x1="770" y1="179" x2="770" y2="230" stroke="#0096f0" stroke-width="1"/>
  <text x="742" y="215" text-anchor="middle" font-size="10" fill="#0096f0">✓ 双膝独立电机</text>
  <text x="742" y="235" text-anchor="middle" font-size="9" fill="#000000">碳纤维框架·运动护具外观</text>
  <text x="742" y="253" text-anchor="middle" font-size="9" fill="#000000">30秒穿戴·~2.0kg</text>
  <text x="742" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#0096f0">膝OA老人：最优方案</text>
</svg>