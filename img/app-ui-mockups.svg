<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f7fa"/>
      <stop offset="100%" stop-color="#e8ecf1"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#fafbfc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66ccff"/>
      <stop offset="100%" stop-color="#4da6ff"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <filter id="phoneShadow" x="-10%" y="-5%" width="125%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="620" rx="16" fill="url(#bg)"/>
  <text x="480" y="36" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="18" font-weight="700" fill="#333">膝安 KneeEase · App 核心界面设计</text>
  <text x="480" y="56" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="11" fill="#888">子女端（iOS/Android）· 老人端无需 App（物理按键操作）</text>

  <!-- ====== PHONE 1: 子女端 · 首页 Dashboard ====== -->
  <g transform="translate(30, 75)" filter="url(#phoneShadow)">
    <rect x="0" y="0" width="280" height="520" rx="28" fill="#1a1a2e"/>
    <!-- Notch -->
    <rect x="90" y="8" width="100" height="20" rx="10" fill="#0d0d1a"/>
    <!-- Status bar -->
    <text x="24" y="44" font-family="-apple-system,sans-serif" font-size="10" fill="#888">9:41</text>
    <text x="240" y="44" text-anchor="end" font-family="-apple-system,sans-serif" font-size="10" fill="#888">膝安</text>

    <!-- Greeting -->
    <text x="24" y="76" font-family="-apple-system,PingFang SC,sans-serif" font-size="16" font-weight="700" fill="#fff">爸妈的膝关节</text>
    <text x="24" y="96" font-family="-apple-system,PingFang SC,sans-serif" font-size="11" fill="#888">今日报告 · 7月7日 周一</text>

    <!-- KAM card -->
    <rect x="16" y="112" width="248" height="78" rx="14" fill="#0d0d1a" stroke="#66ccff" stroke-width="0.5"/>
    <text x="32" y="136" font-family="-apple-system,PingFang SC,sans-serif" font-size="11" fill="#888">左膝负荷指数</text>
    <text x="32" y="162" font-family="-apple-system,SF Mono,monospace" font-size="30" font-weight="900" fill="#66ccff">0.82</text>
    <text x="32" y="180" font-family="-apple-system,PingFang SC,sans-serif" font-size="9" fill="#666">正常范围 0.6–1.2 · 较昨日 ↓8%</text>
    <!-- Mini chart line -->
    <polyline points="190,170 200,165 210,168 220,160 230,163 240,155 250,158" fill="none" stroke="#66ccff" stroke-width="2"/>

    <!-- Right knee -->
    <rect x="16" y="200" width="248" height="60" rx="14" fill="#0d0d1a" stroke="#333" stroke-width="0.5"/>
    <text x="32" y="224" font-family="-apple-system,PingFang SC,sans-serif" font-size="11" fill="#888">右膝负荷指数</text>
    <text x="32" y="248" font-family="-apple-system,SF Mono,monospace" font-size="24" font-weight="900" fill="#66ccff">0.95</text>
    <text x="140" y="248" font-family="-apple-system,PingFang SC,sans-serif" font-size="9" fill="#666">正常 · 较昨日 ↓3%</text>

    <!-- Step count -->
    <rect x="16" y="272" width="120" height="70" rx="14" fill="#0d0d1a" stroke="#333" stroke-width="0.5"/>
    <text x="32" y="296" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" fill="#888">今日步数</text>
    <text x="32" y="326" font-family="-apple-system,SF Mono,monospace" font-size="26" font-weight="900" fill="#fff">3,847</text>
    <text x="32" y="338" font-family="-apple-system,PingFang SC,sans-serif" font-size="8" fill="#666">目标 5,000</text>

    <!-- Device status -->
    <rect x="144" y="272" width="120" height="70" rx="14" fill="#0d0d1a" stroke="#333" stroke-width="0.5"/>
    <text x="160" y="296" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" fill="#888">设备状态</text>
    <circle cx="170" cy="320" r="5" fill="#00cc66"/>
    <text x="180" y="324" font-family="-apple-system,PingFang SC,sans-serif" font-size="12" fill="#00cc66" font-weight="600">在线</text>
    <text x="160" y="338" font-family="-apple-system,PingFang SC,sans-serif" font-size="8" fill="#666">电量 87%</text>

    <!-- Weekly trend -->
    <rect x="16" y="354" width="248" height="80" rx="14" fill="#0d0d1a" stroke="#333" stroke-width="0.5"/>
    <text x="32" y="374" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" fill="#888">本周步态对称性</text>
    <!-- Bar chart -->
    <rect x="32" y="390" width="20" height="24" rx="3" fill="#66ccff" opacity="0.6"/>
    <rect x="58" y="386" width="20" height="28" rx="3" fill="#66ccff" opacity="0.7"/>
    <rect x="84" y="382" width="20" height="32" rx="3" fill="#66ccff" opacity="0.8"/>
    <rect x="110" y="388" width="20" height="26" rx="3" fill="#66ccff" opacity="0.7"/>
    <rect x="136" y="384" width="20" height="30" rx="3" fill="#66ccff" opacity="0.75"/>
    <rect x="162" y="380" width="20" height="34" rx="3" fill="#66ccff" opacity="0.85"/>
    <rect x="188" y="386" width="20" height="28" rx="3" fill="#66ccff" opacity="0.7"/>
    <text x="42" y="430" font-family="monospace" font-size="7" fill="#666">一</text>
    <text x="68" y="430" font-family="monospace" font-size="7" fill="#666">二</text>
    <text x="94" y="430" font-family="monospace" font-size="7" fill="#666">三</text>
    <text x="120" y="430" font-family="monospace" font-size="7" fill="#666">四</text>
    <text x="146" y="430" font-family="monospace" font-size="7" fill="#666">五</text>
    <text x="172" y="430" font-family="monospace" font-size="7" fill="#666">六</text>
    <text x="198" y="430" font-family="monospace" font-size="7" fill="#666">日</text>

    <!-- Alert banner -->
    <rect x="16" y="446" width="248" height="36" rx="10" fill="#2a1515" stroke="#ff6633" stroke-width="0.5"/>
    <text x="32" y="468" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" fill="#ff6633">⚠ 左膝负荷昨日升高 12%，建议减少上下楼</text>

    <!-- Home indicator -->
    <rect x="110" y="504" width="60" height="4" rx="2" fill="#444"/>
  </g>

  <!-- Label: Phone 1 -->
  <text x="170" y="610" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="11" fill="#333" font-weight="600">子女端 · 首页 Dashboard</text>

  <!-- ====== PHONE 2: 子女端 · 周报 ====== -->
  <g transform="translate(340, 75)" filter="url(#phoneShadow)">
    <rect x="0" y="0" width="280" height="520" rx="28" fill="#1a1a2e"/>
    <rect x="90" y="8" width="100" height="20" rx="10" fill="#0d0d1a"/>
    <text x="24" y="44" font-family="-apple-system,sans-serif" font-size="10" fill="#888">9:41</text>
    <text x="240" y="44" text-anchor="end" font-family="-apple-system,sans-serif" font-size="10" fill="#888">周报</text>

    <text x="24" y="76" font-family="-apple-system,PingFang SC,sans-serif" font-size="16" font-weight="700" fill="#fff">本周摘要</text>
    <text x="24" y="96" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" fill="#888">6月30日 – 7月6日 · 第27周</text>

    <!-- Stat cards row -->
    <rect x="16" y="112" width="80" height="64" rx="12" fill="#0d0d1a" stroke="#333" stroke-width="0.5"/>
    <text x="32" y="134" font-family="-apple-system,PingFang SC,sans-serif" font-size="9" fill="#888">总步数</text>
    <text x="32" y="162" font-family="-apple-system,SF Mono,monospace" font-size="18" font-weight="900" fill="#66ccff">5.2万</text>
    <rect x="104" y="112" width="80" height="64" rx="12" fill="#0d0d1a" stroke="#333" stroke-width="0.5"/>
    <text x="120" y="134" font-family="-apple-system,PingFang SC,sans-serif" font-size="9" fill="#888">训练天数</text>
    <text x="120" y="162" font-family="-apple-system,SF Mono,monospace" font-size="18" font-weight="900" fill="#fff">6/7</text>
    <rect x="192" y="112" width="72" height="64" rx="12" fill="#0d0d1a" stroke="#333" stroke-width="0.5"/>
    <text x="208" y="134" font-family="-apple-system,PingFang SC,sans-serif" font-size="9" fill="#888">对称性</text>
    <text x="208" y="162" font-family="-apple-system,SF Mono,monospace" font-size="18" font-weight="900" fill="#00cc66">91%</text>

    <!-- KAM trend -->
    <rect x="16" y="190" width="248" height="110" rx="14" fill="#0d0d1a" stroke="#333" stroke-width="0.5"/>
    <text x="32" y="214" font-family="-apple-system,PingFang SC,sans-serif" font-size="11" fill="#888">膝关节负荷趋势（KAM 周均值）</text>
    <polyline points="32,270 70,262 108,266 146,258 184,254 222,250 248,248" fill="none" stroke="#66ccff" stroke-width="2.5"/>
    <circle cx="32" cy="270" r="3" fill="#66ccff"/>
    <circle cx="222" cy="250" r="3" fill="#ffb3d9"/>
    <text x="32" y="292" font-family="-apple-system,PingFang SC,sans-serif" font-size="8" fill="#66ccff">左膝</text>
    <text x="180" y="292" font-family="-apple-system,PingFang SC,sans-serif" font-size="8" fill="#ffb3d9">右膝</text>
    <text x="240" y="292" text-anchor="end" font-family="-apple-system,PingFang SC,sans-serif" font-size="9" fill="#888">↓12%</text>

    <!-- Key insight -->
    <rect x="16" y="314" width="248" height="100" rx="14" fill="#0d0d1a" stroke="#333" stroke-width="0.5"/>
    <text x="32" y="338" font-family="-apple-system,PingFang SC,sans-serif" font-size="11" fill="#888">关键发现</text>
    <text x="32" y="358" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" fill="#ccc" line-height="1.6">• 左膝负荷连续 4 周下降</text>
    <text x="32" y="376" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" fill="#ccc">• 周末主动训练频率增加</text>
    <text x="32" y="394" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" fill="#ccc">• 建议维持当前辅助等级</text>

    <!-- AI assistant note -->
    <rect x="16" y="426" width="248" height="52" rx="10" fill="#0d1a2a" stroke="#66ccff" stroke-width="0.5"/>
    <text x="32" y="448" font-family="-apple-system,PingFang SC,sans-serif" font-size="9" fill="#66ccff">🤖 AI 建议：本周下楼辅助力矩可微调至 14Nm</text>
    <text x="32" y="466" font-family="-apple-system,PingFang SC,sans-serif" font-size="8" fill="#666">基于联邦学习聚合了 1,247 名相似用户的策略</text>

    <rect x="110" y="504" width="60" height="4" rx="2" fill="#444"/>
  </g>

  <text x="480" y="610" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="11" fill="#333" font-weight="600">子女端 · 周报</text>

  <!-- ====== PHONE 3: 老人端 · 无需App ====== -->
  <g transform="translate(650, 75)" filter="url(#phoneShadow)">
    <rect x="0" y="0" width="280" height="520" rx="28" fill="#1a1a2e"/>
    <rect x="90" y="8" width="100" height="20" rx="10" fill="#0d0d1a"/>
    <text x="24" y="44" font-family="-apple-system,sans-serif" font-size="10" fill="#888">老人端</text>

    <text x="140" y="100" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="14" font-weight="700" fill="#fff">老人不需要 App</text>
    <text x="140" y="122" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" fill="#888">三个物理按键完成所有操作</text>

    <!-- Physical button mockup -->
    <rect x="60" y="145" width="160" height="260" rx="20" fill="#0d0d1a" stroke="#333" stroke-width="1"/>
    <text x="140" y="175" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" fill="#888">设备操作面板</text>

    <!-- Button 1: Mode switch -->
    <rect x="80" y="195" width="120" height="48" rx="24" fill="#0a1a2a" stroke="#66ccff" stroke-width="1.5"/>
    <text x="140" y="216" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="12" fill="#66ccff" font-weight="600">按一下 · 切换模式</text>
    <text x="140" y="234" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="8" fill="#888">助力 → 训练 → 按摩</text>

    <!-- Button 2: Level adjust -->
    <rect x="80" y="255" width="56" height="48" rx="12" fill="#0d0d1a" stroke="#555" stroke-width="1"/>
    <text x="108" y="286" text-anchor="middle" font-family="-apple-system,SF Mono,monospace" font-size="16" fill="#fff">+</text>
    <rect x="144" y="255" width="56" height="48" rx="12" fill="#0d0d1a" stroke="#555" stroke-width="1"/>
    <text x="172" y="286" text-anchor="middle" font-family="-apple-system,SF Mono,monospace" font-size="16" fill="#fff">−</text>
    <text x="140" y="322" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="8" fill="#888">辅助力度调节</text>

    <!-- Button 3: Emergency -->
    <rect x="80" y="340" width="120" height="48" rx="24" fill="#2a1515" stroke="#ff6633" stroke-width="1.5"/>
    <text x="140" y="366" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="12" fill="#ff6633" font-weight="600">紧急停止</text>

    <!-- Feedback section -->
    <text x="140" y="435" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" fill="#888">设备反馈</text>
    <text x="140" y="455" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="9" fill="#666">LED 颜色 + 震动确认</text>
    <text x="140" y="472" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="9" fill="#666">子女端远程查看状态</text>

    <rect x="110" y="504" width="60" height="4" rx="2" fill="#444"/>
  </g>

  <text x="790" y="610" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="11" fill="#333" font-weight="600">老人端 · 物理按键（无需 App）</text>
</svg>