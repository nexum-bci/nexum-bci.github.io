    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0FE0C4"/><stop offset="100%" stop-color="#00C4A7"/></linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0FE0C4"/><stop offset="100%" stop-color="#00A88A"/></linearGradient>
