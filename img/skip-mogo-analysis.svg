<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="overviewGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowDeep" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  \&lt;!-- Background -->
  <rect width="1200" height="1000" fill="#ffffff"/>

  \&lt;!-- ===== TITLE ===== -->
  <rect x="0" y="0" width="1200" height="72" fill="url(#headerGrad)"/>
  <text x="600" y="32" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Skip MO/GO — 软体外骨骼的终极参照</text>
  <text x="600" y="56" text-anchor="middle" fill="#aab4c6" font-size="14" font-weight="400">Skip MO/GO — The Definitive Benchmark in Soft Exoskeletons</text>

  \&lt;!-- ===== PRODUCT OVERVIEW ===== -->
  <rect x="20" y="84" width="1160" height="78" rx="6" fill="url(#overviewGrad)" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="36" y="108" font-size="15" font-weight="700" fill="#212529">产品概览</text>
  <text x="36" y="128" font-size="11" fill="#495057">Google X spinout · Arc'teryx 联名 · $5,000 售价 · 3.2kg 系统重量 · 10 个裤码</text>
  <text x="36" y="146" font-size="11" fill="#495057">3h 电池续航 (上坡最大助力) · 膝关节磁力执行器 · 下坡回充 · 跳票至 2027 Spring · $6M 融资 · 租赁 $80/天</text>

  \&lt;!-- ===== SECTION LABELS ===== -->
  \&lt;!-- Flaws header -->
  <rect x="20" y="176" width="568" height="32" rx="4" fill="#dc3545" opacity="0.9"/>
  <text x="304" y="197" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">3 大致命缺陷 / 3 Fatal Flaws</text>

  \&lt;!-- Solutions header -->
  <rect x="612" y="176" width="568" height="32" rx="4" fill="#28a745" opacity="0.9"/>
  <text x="896" y="197" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">BONES 解决方案 / BONES Solutions</text>

  \&lt;!-- ===== FLAW 1 ===== -->
  <rect x="20" y="216" width="568" height="170" rx="5" fill="#fff5f5" stroke="#f5c6cb" stroke-width="1" filter="url(#shadow)"/>
  <rect x="20" y="216" width="568" height="26" rx="5" fill="#dc3545" opacity="0.08"/>
  <text x="36" y="234" font-size="13" font-weight="700" fill="#c82333">缺陷 1 / Flaw 1: 定价陷阱 $5,000</text>
  <text x="36" y="254" font-size="10.5" fill="#6c757d">Skip 定价 $5,000/套</text>
  <text x="36" y="270" font-size="10.5" fill="#6c757d">定制磁阻 PM BLDC QDD 执行器 (估 $200–300/个 × 2)</text>
  <text x="36" y="286" font-size="10.5" fill="#6c757d">Arc'teryx Gamma 裤捆绑 ($250–300)</text>
  <text x="36" y="302" font-size="10.5" fill="#6c757d">总 BOM 估 $800–1,200</text>
  <text x="36" y="324" font-size="10.5" fill="#868e96" font-style="italic">目标人群仅为户外运动爱好者，市场天花板极低</text>
  <text x="36" y="344" font-size="10.5" fill="#868e96" font-style="italic">BOM-to-retail 4-6x → 定价策略不可持续</text>

  \&lt;!-- ===== SOLUTION 1 ===== -->
  <rect x="612" y="216" width="568" height="170" rx="5" fill="#f0fff4" stroke="#c3e6cb" stroke-width="1" filter="url(#shadow)"/>
  <rect x="612" y="216" width="568" height="26" rx="5" fill="#28a745" opacity="0.08"/>
  <text x="628" y="234" font-size="13" font-weight="700" fill="#218838">方案 1 / Solution 1: 成本重构</text>
  <text x="628" y="254" font-size="10.5" fill="#6c757d">BONES 方案: 标准 BLDC + 行星齿轮减速器</text>
  <text x="628" y="270" font-size="10.5" fill="#6c757d">¥200–300/个 vs Skip 的 $200–300/个 (10x 价差)</text>
  <text x="628" y="286" font-size="10.5" fill="#6c757d">2 个尺码 (S/M, L/XL) + 可调绑带</text>
  <text x="628" y="302" font-size="10.5" fill="#6c757d">独立绑缚系统 — 不绑定裤子</text>
  <text x="628" y="324" font-size="10.5" fill="#868e96" font-style="italic">目标零售 ¥3,999–4,999</text>
  <text x="628" y="344" font-size="10.5" fill="#868e96" font-style="italic">BOM-to-retail ~2-3x → 高毛利可持续</text>

  \&lt;!-- ===== FLAW 2 ===== -->
  <rect x="20" y="394" width="568" height="170" rx="5" fill="#fff5f5" stroke="#f5c6cb" stroke-width="1" filter="url(#shadow)"/>
  <rect x="20" y="394" width="568" height="26" rx="5" fill="#dc3545" opacity="0.08"/>
  <text x="36" y="412" font-size="13" font-weight="700" fill="#c82333">缺陷 2 / Flaw 2: 库存噩梦 10 个裤码</text>
  <text x="36" y="432" font-size="10.5" fill="#6c757d">10 个尺码 = 库存数量 ×10</text>
  <text x="36" y="448" font-size="10.5" fill="#6c757d">每尺码需备货 → 资金占用 ×10</text>
  <text x="36" y="464" font-size="10.5" fill="#6c757d">退货率 20–30% (服装行业标准)</text>
  <text x="36" y="486" font-size="10.5" fill="#868e96" font-style="italic">用户体型变化 → 需要新裤子 → 复购逻辑荒谬</text>
  <text x="36" y="506" font-size="10.5" fill="#868e96" font-style="italic">多尺码加高了生产成本和供应链复杂度</text>
  <text x="36" y="528" font-size="10.5" fill="#868e96" font-style="italic">规模扩张时库存风险指数级增长</text>

  \&lt;!-- ===== SOLUTION 2 ===== -->
  <rect x="612" y="394" width="568" height="170" rx="5" fill="#f0fff4" stroke="#c3e6cb" stroke-width="1" filter="url(#shadow)"/>
  <rect x="612" y="394" width="568" height="26" rx="5" fill="#28a745" opacity="0.08"/>
  <text x="628" y="412" font-size="13" font-weight="700" fill="#218838">方案 2 / Solution 2: 极简 SKU 策略</text>
  <text x="628" y="432" font-size="10.5" fill="#6c757d">2 个 SKU 覆盖 40cm+ 调节范围</text>
  <text x="628" y="448" font-size="10.5" fill="#6c757d">魔术贴 + 棘轮绑带 = "绑在您的裤子外面"</text>
  <text x="628" y="464" font-size="10.5" fill="#6c757d">非服装产品 → 退货率 &lt;8% (消费电子标准)</text>
  <text x="628" y="486" font-size="10.5" fill="#868e96" font-style="italic">用户体型变化 → 调节绑带即可 → 无需换购</text>
  <text x="628" y="506" font-size="10.5" fill="#868e96" font-style="italic">供应链友好: 2 个 SKU 备货简单</text>
  <text x="628" y="526" font-size="10.5" fill="#868e96" font-style="italic">可配合任何裤子使用 — 用户选择自由</text>

  \&lt;!-- ===== FLAW 3 ===== -->
  <rect x="20" y="572" width="568" height="170" rx="5" fill="#fff5f5" stroke="#f5c6cb" stroke-width="1" filter="url(#shadow)"/>
  <rect x="20" y="572" width="568" height="26" rx="5" fill="#dc3545" opacity="0.08"/>
  <text x="36" y="590" font-size="13" font-weight="700" fill="#c82333">缺陷 3 / Flaw 3: 续航短板 3h</text>
  <text x="36" y="610" font-size="10.5" fill="#6c757d">3h 标称续航 (上坡模式)</text>
  <text x="36" y="626" font-size="10.5" fill="#6c757d">腰带集成电池 ~150Wh</text>
  <text x="36" y="642" font-size="10.5" fill="#6c757d">QDD 低减速比 = 高铜损</text>
  <text x="36" y="658" font-size="10.5" fill="#6c757d">陡坡 200–400W 总功率 → 实际全力续航 ~45–90min</text>
  <text x="36" y="680" font-size="10.5" fill="#868e96" font-style="italic">"3h" 是实验室理想条件，实际越野攀登一半不到</text>
  <text x="36" y="698" font-size="10.5" fill="#868e96" font-style="italic">电池集成在腰带 → 不可热插拔 → 长途无法续命</text>
  <text x="36" y="714" font-size="10.5" fill="#868e96" font-style="italic">150Wh 超出行李限制 (&lt;\&lt;100Wh) → 无法携带登机</text>

  \&lt;!-- ===== SOLUTION 3 ===== -->
  <rect x="612" y="572" width="568" height="170" rx="5" fill="#f0fff4" stroke="#c3e6cb" stroke-width="1" filter="url(#shadow)"/>
  <rect x="612" y="572" width="568" height="26" rx="5" fill="#28a745" opacity="0.08"/>
  <text x="628" y="590" font-size="13" font-weight="700" fill="#218838">方案 3 / Solution 3: 续航革命</text>
  <text x="628" y="610" font-size="10.5" fill="#6c757d">高减速比 (9:1 vs Skip ~8:1)</text>
  <text x="628" y="626" font-size="10.5" fill="#6c757d">电机工作在高效区 → 铜损显著降低</text>
  <text x="628" y="642" font-size="10.5" fill="#6c757d">腰部热插拔电池 (三星 50E 4S1P, 72Wh ×2)</text>
  <text x="628" y="658" font-size="10.5" fill="#6c757d">4–6h 实际使用</text>
  <text x="628" y="680" font-size="10.5" fill="#868e96" font-style="italic">72Wh ×2 \&lt; 100Wh → 符合航空规定 → 可登机</text>
  <text x="628" y="698" font-size="10.5" fill="#868e96" font-style="italic">热插拔设计 → 无限续航 (多备电池组)</text>
  <text x="628" y="714" font-size="10.5" fill="#868e96" font-style="italic">腰部电池分布 → 重心更合理 → 舒适度提升</text>

  \&lt;!-- ===== DIVIDER between flaws/solutions and bottom ===== -->
  <line x1="20" y1="756" x2="1180" y2="756" stroke="#dee2e6" stroke-width="1"/>

  \&lt;!-- ===== BOTTOM-LEFT: 3 DESIGN PHILOSOPHIES ===== -->
  <rect x="20" y="768" width="760" height="216" rx="5" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" filter="url(#shadowDeep)"/>
  <rect x="20" y="768" width="760" height="32" rx="5" fill="#1a1a2e"/>
  <text x="400" y="789" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">值得学习的 3 个设计哲学 / 3 Design Philosophies to Learn</text>

  \&lt;!-- Philosophy 1 -->
  <rect x="36" y="810" width="356" height="80" rx="4" fill="#ffffff" stroke="#e9ecef" stroke-width="1"/>
  <text x="48" y="828" font-size="12" font-weight="700" fill="#495057">1. "Social Acceptability First"</text>
  <text x="48" y="846" font-size="10.5" fill="#6c757d">看起来像服装不是机器 — 降低用户心理门槛</text>
  <text x="48" y="864" font-size="10.5" fill="#868e96" font-style="italic">BONES Gen 3 目标: 内嵌于日常衣物</text>
  <text x="48" y="880" font-size="10.5" fill="#868e96" font-style="italic">形似 "智能护膝" 而非 "外骨骼"</text>

  \&lt;!-- Philosophy 2 -->
  <rect x="408" y="810" width="356" height="80" rx="4" fill="#ffffff" stroke="#e9ecef" stroke-width="1"/>
  <text x="420" y="828" font-size="12" font-weight="700" fill="#495057">2. Downhill Regenerative Charging</text>
  <text x="420" y="846" font-size="10.5" fill="#6c757d">下坡回充 = 聪明的工程叙事 + 实际节能</text>
  <text x="420" y="864" font-size="10.5" fill="#868e96" font-style="italic">BONES Gen 2 采纳: 回充 + 能量管理策略</text>
  <text x="420" y="880" font-size="10.5" fill="#868e96" font-style="italic">既是功能也是营销亮点</text>

  \&lt;!-- Philosophy 3 -->
  <rect x="36" y="898" width="728" height="76" rx="4" fill="#ffffff" stroke="#e9ecef" stroke-width="1"/>
  <text x="48" y="916" font-size="12" font-weight="700" fill="#495057">3. Brand-First Strategy (Arc'teryx halo → product credibility)</text>
  <text x="48" y="934" font-size="10.5" fill="#6c757d">顶级户外品牌背书 → 产品可信度瞬间拉满</text>
  <text x="48" y="952" font-size="10.5" fill="#868e96" font-style="italic">BONES 策略: 合作中国户外/运动品牌，借本土信任势能</text>
  <text x="48" y="966" font-size="10.5" fill="#868e96" font-style="italic">安踏/李宁/探路者 → 渠道 + 品牌 + 用户触达三位一体</text>

  \&lt;!-- ===== BOTTOM-RIGHT: WHY SKIP DOESN'T DO ELDERLY ===== -->
  <rect x="796" y="768" width="384" height="216" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="1" filter="url(#shadowDeep)"/>
  <rect x="796" y="768" width="384" height="32" rx="5" fill="#e65100"/>
  <text x="988" y="789" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">为什么 Skip 不做老年市场</text>

  <text x="812" y="818" font-size="10.5" font-weight="600" fill="#e65100">商业选择，非技术限制</text>

  <text x="812" y="842" font-size="10" fill="#8d6e00">• Arc'teryx 品牌 = 户外极限 (20–45岁)</text>
  <text x="812" y="860" font-size="10" fill="#8d6e00">  无法稀释品牌调性做老年市场</text>

  <text x="812" y="884" font-size="10" fill="#8d6e00">• 10 尺码对健康成年已噩梦</text>
  <text x="812" y="902" font-size="10" fill="#8d6e00">  老年人体型差异是 2–3 倍</text>

  <text x="812" y="926" font-size="10" fill="#8d6e00">• $5,000 远超老年人支付意愿</text>
  <text x="812" y="944" font-size="10" fill="#8d6e00">  Medicare 不报销消费级外骨骼</text>

  <text x="812" y="968" font-size="10" fill="#8d6e00">• 老年用户产品责任风险更高</text>
  <text x="812" y="986" font-size="10" fill="#8d6e00">  DTC + 户外零售 ≠ 医疗/老年渠道</text>

  \&lt;!-- Bottom insight line -->
  <text x="812" y="1010" font-size="11" font-weight="700" fill="#c82333">→ BONES 机会: 做 Skip 不做的事</text>
</svg>