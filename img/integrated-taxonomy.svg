<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC','Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <!-- Full body (pelvis + legs + knees) schematic -->
    <g id="fullbody">
      <!-- Torso -->
      <rect x="128" y="20" width="16" height="28" rx="3" fill="none" stroke="#1a1a2e" stroke-width="2.5"/>
      <!-- Pelvis -->
      <polygon points="118,48 154,48 158,62 114,62" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Hip joints -->
      <circle cx="118" cy="55" r="3" fill="#888" stroke="none"/>
      <circle cx="154" cy="55" r="3" fill="#888" stroke="none"/>
      <!-- Thighs -->
      <line x1="118" y1="62" x2="115" y2="88" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
      <line x1="154" y1="62" x2="157" y2="88" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
      <!-- Knee joints -->
      <circle cx="115" cy="88" r="3" fill="#888" stroke="none"/>
      <circle cx="157" cy="88" r="3" fill="#888" stroke="none"/>
      <!-- Shanks -->
      <line x1="115" y1="88" x2="112" y2="114" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
      <line x1="157" y1="88" x2="160" y2="114" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    </g>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#ffffff"/>

  <!-- ============ HEADER ============ -->
  <text x="600" y="30" font-size="20" font-weight="800" fill="#1a1a2e" text-anchor="middle" letter-spacing="1.5">髋膝一体外骨骼 — 4种关节覆盖方案</text>
  <text x="600" y="48" font-size="12" fill="#666" text-anchor="middle">按关节覆盖范围+模块化程度分类 · 4种评级</text>

  <!-- ============ ROW 1 (single row of 4 cards) ============ -->

  <!-- CARD 1: 腰带4电机联动 — #0096f0 推荐借鉴 -->
  <g transform="translate(24, 75)">
    <rect x="0" y="0" width="270" height="180" rx="8" fill="#f5faff" stroke="#0096f0" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="10" y="19" font-size="14" font-weight="700" fill="#1a1a2e">1. 腰带4电机联动</text>
    <text x="10" y="33" font-size="10" fill="#666">4-Motor Belt Drive</text>
    <line x1="10" y1="37" x2="260" y2="37" stroke="#bbdefb" stroke-width="1.2"/>
    <!-- Diagram -->
    <use href="#fullbody"/>
    <!-- 4 motor symbols -->
    <circle cx="118" cy="55" r="5.5" fill="none" stroke="#0096f0" stroke-width="1.8"/>
    <text x="118" y="58" font-size="9" font-weight="700" fill="#0096f0" text-anchor="middle">M</text>
    <circle cx="154" cy="55" r="5.5" fill="none" stroke="#0096f0" stroke-width="1.8"/>
    <text x="154" y="58" font-size="9" font-weight="700" fill="#0096f0" text-anchor="middle">M</text>
    <circle cx="115" cy="88" r="5.5" fill="none" stroke="#0096f0" stroke-width="1.8"/>
    <text x="115" y="91" font-size="9" font-weight="700" fill="#0096f0" text-anchor="middle">M</text>
    <circle cx="157" cy="88" r="5.5" fill="none" stroke="#0096f0" stroke-width="1.8"/>
    <text x="157" y="91" font-size="9" font-weight="700" fill="#0096f0" text-anchor="middle">M</text>
    <!-- Belt connection -->
    <path d="M106,55 L166,55" stroke="#0096f0" stroke-width="3" stroke-linecap="round"/>
    <!-- Connection lines between motors -->
    <line x1="118" y1="60.5" x2="115" y2="82.5" stroke="#0096f0" stroke-width="1.5" stroke-dasharray="2,2"/>
    <line x1="154" y1="60.5" x2="157" y2="82.5" stroke="#0096f0" stroke-width="1.5" stroke-dasharray="2,2"/>
    <text x="135" y="116" font-size="10" fill="#555" text-anchor="middle">4电机 · 腰带+大腿联动</text>
    <line x1="10" y1="120" x2="260" y2="120" stroke="#bbdefb" stroke-width="1.2"/>
    <!-- Product info -->
    <text x="10" y="130" font-size="10" fill="#444">Vastnaut One 4x4 2.7kg</text>
    <text x="10" y="141" font-size="10" fill="#444">$1299-1899 · KS$1.26M</text>
    <text x="10" y="152" font-size="10" fill="#444">4电机 · 86%碳纤维 · IP54</text>
    <!-- Rating badge -->
    <rect x="10" y="158" width="110" height="16" rx="3" fill="#e3f2fd"/>
    <text x="65" y="170" font-size="10" font-weight="600" fill="#0096f0" text-anchor="middle">推荐借鉴 · 已验证</text>
    <!-- Bottom bar (Bones借鉴要点) -->
    <rect x="8" y="178" width="254" height="15" rx="4" fill="#0096f0"/>
    <text x="135" y="189" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">推荐 · 4电机联动+碳纤维轻量化</text>
  </g>

  <!-- CARD 2: 模块化即插即用 — #0096f0 推荐借鉴 -->
  <g transform="translate(318, 75)">
    <rect x="0" y="0" width="270" height="180" rx="8" fill="#f5faff" stroke="#0096f0" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="10" y="19" font-size="14" font-weight="700" fill="#1a1a2e">2. 模块化即插即用</text>
    <text x="10" y="33" font-size="10" fill="#666">Modular Plug-and-Play</text>
    <line x1="10" y1="37" x2="260" y2="37" stroke="#bbdefb" stroke-width="1.2"/>
    <!-- Diagram -->
    <use href="#fullbody"/>
    <!-- Hip module left -->
    <rect x="104" y="48" width="22" height="14" rx="3" fill="none" stroke="#0096f0" stroke-width="1.8"/>
    <text x="115" y="59" font-size="9" font-weight="700" fill="#0096f0" text-anchor="middle">髋</text>
    <!-- Hip module right -->
    <rect x="146" y="48" width="22" height="14" rx="3" fill="none" stroke="#0096f0" stroke-width="1.8"/>
    <text x="157" y="59" font-size="9" font-weight="700" fill="#0096f0" text-anchor="middle">髋</text>
    <!-- Knee module left -->
    <rect x="101" y="81" width="22" height="14" rx="3" fill="none" stroke="#0096f0" stroke-width="1.8"/>
    <text x="112" y="92" font-size="9" font-weight="700" fill="#0096f0" text-anchor="middle">膝</text>
    <!-- Knee module right -->
    <rect x="149" y="81" width="22" height="14" rx="3" fill="none" stroke="#0096f0" stroke-width="1.8"/>
    <text x="160" y="92" font-size="9" font-weight="700" fill="#0096f0" text-anchor="middle">膝</text>
    <!-- Plug arrows (horizontal) -->
    <path d="M128,55 L142,55" stroke="#0096f0" stroke-width="1.8" stroke-linecap="round"/>
    <polygon points="144,55 139,52 139,58" fill="#0096f0"/>
    <path d="M125,88 L145,88" stroke="#0096f0" stroke-width="1.8" stroke-linecap="round"/>
    <polygon points="147,88 142,85 142,91" fill="#0096f0"/>
    <text x="135" y="116" font-size="10" fill="#555" text-anchor="middle">模块化 · 髋膝独立组合</text>
    <line x1="10" y1="120" x2="260" y2="120" stroke="#bbdefb" stroke-width="1.2"/>
    <!-- Product info -->
    <text x="10" y="130" font-size="10" fill="#444">DNSYS X1 $689 + Z1 $699</text>
    <text x="10" y="141" font-size="10" fill="#444">Ascentiz K1 1.77kg · 48Nm</text>
    <text x="10" y="152" font-size="10" fill="#444">$549-1648 · BodyOS</text>
    <!-- Rating badge -->
    <rect x="10" y="158" width="110" height="16" rx="3" fill="#e3f2fd"/>
    <text x="65" y="170" font-size="10" font-weight="600" fill="#0096f0" text-anchor="middle">推荐借鉴 · 已验证</text>
    <!-- Bottom bar (Bones借鉴要点) -->
    <rect x="8" y="178" width="254" height="15" rx="4" fill="#0096f0"/>
    <text x="135" y="189" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">推荐 · 髋+膝独立模块组合</text>
  </g>

  <!-- CARD 3: 全下肢刚性框架(医疗) — #9E9E9E 不推荐 -->
  <g transform="translate(612, 75)">
    <rect x="0" y="0" width="270" height="180" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="10" y="19" font-size="14" font-weight="700" fill="#1a1a2e">3. 全下肢刚性框架</text>
    <text x="10" y="33" font-size="10" fill="#666">Full Lower-Limb Rigid Frame</text>
    <line x1="10" y1="37" x2="260" y2="37" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Diagram -->
    <use href="#fullbody"/>
    <!-- Full frame left -->
    <rect x="104" y="18" width="10" height="96" rx="2" fill="none" stroke="#9e9e9e" stroke-width="2"/>
    <rect x="158" y="18" width="10" height="96" rx="2" fill="none" stroke="#9e9e9e" stroke-width="2"/>
    <!-- Cross braces -->
    <line x1="109" y1="34" x2="163" y2="34" stroke="#9e9e9e" stroke-width="1.5"/>
    <line x1="109" y1="52" x2="163" y2="52" stroke="#9e9e9e" stroke-width="1.5"/>
    <line x1="109" y1="72" x2="163" y2="72" stroke="#9e9e9e" stroke-width="1.5"/>
    <line x1="109" y1="92" x2="163" y2="92" stroke="#9e9e9e" stroke-width="1.5"/>
    <!-- Weight indicator -->
    <text x="136" y="48" font-size="10" fill="#9e9e9e" text-anchor="middle" font-weight="700">&gt;18kg</text>
    <text x="136" y="105" font-size="10" fill="#555" text-anchor="middle">刚性框架 · 大自重</text>
    <line x1="10" y1="120" x2="260" y2="120" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Product info -->
    <text x="10" y="130" font-size="10" fill="#444">ReWalk P6.0 23.3kg · ~$70K</text>
    <text x="10" y="141" font-size="10" fill="#444">EksoNR 22.7-25kg FDA/CE</text>
    <text x="10" y="152" font-size="10" fill="#444">傅利叶ExoMotus 18kg · 120Nm</text>
    <!-- Rating badge -->
    <rect x="10" y="158" width="110" height="16" rx="3" fill="#f5f5f5"/>
    <text x="65" y="170" font-size="10" font-weight="600" fill="#9e9e9e" text-anchor="middle">不推荐 · 仅跟踪</text>
    <!-- Bottom bar -->
    <rect x="8" y="178" width="254" height="15" rx="4" fill="#9e9e9e"/>
    <text x="135" y="189" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">不推荐 · 太重太贵/仅跟踪</text>
  </g>

  <!-- CARD 4: 自平衡免提式 — #9E9E9E 不推荐 -->
  <g transform="translate(906, 75)">
    <rect x="0" y="0" width="270" height="180" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="10" y="19" font-size="14" font-weight="700" fill="#1a1a2e">4. 自平衡免提式</text>
    <text x="10" y="33" font-size="10" fill="#666">Self-Balancing Hands-Free</text>
    <line x1="10" y1="37" x2="260" y2="37" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Diagram -->
    <use href="#fullbody"/>
    <!-- Base platform -->
    <rect x="88" y="116" width="96" height="4" rx="2" fill="#9e9e9e"/>
    <!-- Wheels -->
    <circle cx="94" cy="122" r="6" fill="none" stroke="#9e9e9e" stroke-width="1.5"/>
    <circle cx="178" cy="122" r="6" fill="none" stroke="#9e9e9e" stroke-width="1.5"/>
    <!-- Support frame -->
    <line x1="100" y1="116" x2="110" y2="48" stroke="#9e9e9e" stroke-width="1.5"/>
    <line x1="172" y1="116" x2="162" y2="48" stroke="#9e9e9e" stroke-width="1.5"/>
    <line x1="110" y1="48" x2="162" y2="48" stroke="#9e9e9e" stroke-width="1.5"/>
    <!-- Weight indicator -->
    <text x="136" y="70" font-size="10" fill="#9e9e9e" text-anchor="middle" font-weight="700">80kg</text>
    <text x="136" y="105" font-size="10" fill="#555" text-anchor="middle">自平衡平台 · 超大自重</text>
    <line x1="10" y1="120" x2="260" y2="120" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Product info -->
    <text x="10" y="130" font-size="10" fill="#444">Wandercraft Atalante X</text>
    <text x="10" y="141" font-size="10" fill="#444">80kg · FDA 2024 · 12DoF</text>
    <text x="10" y="152" font-size="10" fill="#444">2km/h · $150K+</text>
    <!-- Rating badge -->
    <rect x="10" y="158" width="110" height="16" rx="3" fill="#f5f5f5"/>
    <text x="65" y="170" font-size="10" font-weight="600" fill="#9e9e9e" text-anchor="middle">不推荐 · 仅跟踪</text>
    <!-- Bottom bar -->
    <rect x="8" y="178" width="254" height="15" rx="4" fill="#9e9e9e"/>
    <text x="135" y="189" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">不推荐 · 超大自重/非穿戴</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <line x1="24" y1="285" x2="1176" y2="285" stroke="#e0e0e0" stroke-width="1"/>
  <g transform="translate(0, 293)">
    <rect x="24" y="0" width="12" height="12" rx="2" fill="#0096f0"/>
    <text x="42" y="10" font-size="10" fill="#555">推荐借鉴</text>

    <rect x="150" y="0" width="12" height="12" rx="2" fill="#d97706"/>
    <text x="168" y="10" font-size="10" fill="#555">部分借鉴</text>

    <rect x="276" y="0" width="12" height="12" rx="2" fill="#9e9e9e"/>
    <text x="294" y="10" font-size="10" fill="#555">不推荐/仅跟踪</text>

    <text x="430" y="10" font-size="10" fill="#999">—— 关节覆盖范围+模块化程度排列，共4类方案</text>
  </g>
</svg>
