<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 960" width="900" height="960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#eef1f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66ccff"/>
      <stop offset="100%" stop-color="#4da6ff"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="motor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.10"/>
    </filter>
    <filter id="card" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#66ccff"/>
    </marker>
  </defs>

  <rect width="900" height="960" rx="16" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="56" rx="16" fill="url(#accent)"/>
  <rect x="0" y="40" width="900" height="16" fill="url(#accent)"/>
  <text x="450" y="36" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="18" font-weight="700" fill="#fff">Bones Gen 1 · 膝安 KneeEase · 消费级膝关节运动辅助装置</text>
  <text x="450" y="80" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="12" fill="#666">碳纤维框架 · AK80-9 低减速比电机 · 腰带集中供电 · 30秒穿戴 · 断电 Fail-Safe · 运动护具外观</text>

  <!-- ====== HUMAN FIGURE ====== -->
  <g transform="translate(310, 115)" filter="url(#shadow)">
    <!-- Head -->
    <ellipse cx="0" cy="26" rx="26" ry="30" fill="#ead9c8" stroke="#c8b098" stroke-width="1.5"/>
    <!-- Hair (elder, grey) -->
    <path d="M-24,18 Q-28,-2 -14,-10 Q0,-18 14,-10 Q28,-2 24,18" fill="#c8c8c8"/>
    <!-- Neck -->
    <rect x="-9" y="52" width="18" height="12" rx="4" fill="#ead9c8"/>

    <!-- Torso (clothed) -->
    <path d="M-44,64 Q-48,130 -42,180 Q-35,210 0,215 Q35,210 42,180 Q48,130 44,64 Z" fill="#4a5568" stroke="#3a4558" stroke-width="2"/>

    <!-- LEFT ARM (behind body) -->
    <path d="M-44,80 Q-65,150 -55,240 Q-50,310 -55,380" stroke="#3a4558" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.4"/>

    <!-- RIGHT ARM (foreground, with cane) -->
    <path d="M44,80 Q62,145 54,220 Q50,280 54,370" stroke="#4a5568" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M54,370 Q52,400 48,430" stroke="#ead9c8" stroke-width="16" stroke-linecap="round" fill="none"/>
    <circle cx="46" cy="435" r="10" fill="#ead9c8"/>

    <!-- CANE -->
    <line x1="46" y1="435" x2="72" y2="620" stroke="#8B6914" stroke-width="5" stroke-linecap="round"/>
    <line x1="72" y1="435" x2="62" y2="620" stroke="#8B6914" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <ellipse cx="67" cy="622" rx="6" ry="3" fill="#333"/>

    <!-- RIGHT LEG (with exoskeleton) -->
    <path d="M5,215 Q15,290 18,380" stroke="#4a5568" stroke-width="54" stroke-linecap="round" fill="none"/>
    <path d="M15,400 Q10,470 8,540 Q5,570 2,590" stroke="#4a5568" stroke-width="40" stroke-linecap="round" fill="none"/>
    <!-- Complete foot -->
    <path d="M-22,588 L-34,594 Q-40,596 -44,594 L-18,608 Q-5,614 8,610 L28,596 Q34,594 38,596 L0,588 Z" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="-42" y1="594" x2="36" y2="594" stroke="#111" stroke-width="3" stroke-linecap="round"/>
    <rect x="-44" y="590" width="20" height="6" rx="2" fill="#1a1a1a"/>

    <!-- LEFT LEG (background) -->
    <path d="M-8,215 Q-20,290 -22,380 Q-24,470 -20,540 Q-18,570 -16,595" stroke="#3a4558" stroke-width="46" stroke-linecap="round" fill="none" opacity="0.35"/>
    <ellipse cx="-12" cy="595" rx="42" ry="8" fill="#222" opacity="0.3"/>
  </g>

  <!-- ====== EXOSKELETON ON RIGHT LEG ====== -->
  <g transform="translate(310, 115)" filter="url(#shadow)">
    <!-- Waist Belt -->
    <rect x="-54" y="165" width="108" height="38" rx="12" fill="#1a1a2e" stroke="#66ccff" stroke-width="2.5"/>
    <text x="0" y="183" text-anchor="middle" font-family="monospace" font-size="8" fill="#66ccff" font-weight="700">MCU + BMS</text>
    <text x="0" y="195" text-anchor="middle" font-family="monospace" font-size="6" fill="#888">ESP32-S3 · 72Wh</text>
    <circle cx="-32" cy="184" r="3" fill="#00cc66"/>
    <circle cx="-22" cy="184" r="3" fill="#00cc66"/>
    <circle cx="-12" cy="184" r="3" fill="#ffaa00"/>

    <!-- Power cable belt→knee -->
    <path d="M32,185 Q40,260 32,370" stroke="#66ccff" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.4"/>

    <!-- Upper thigh strap -->
    <rect x="-38" y="250" width="76" height="16" rx="5" fill="#2a2a2a" stroke="#555" stroke-width="1.5"/>
    <text x="0" y="261" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#aaa">IMU · 大腿</text>

    <!-- Carbon fiber frame — upper -->
    <path d="M8,215 L16,300 L18,365" stroke="url(#frame)" stroke-width="12" stroke-linecap="round"/>
    <path d="M8,215 L16,300 L18,365" stroke="#444" stroke-width="8" stroke-linecap="round"/>

    <!-- Knee joint — motor + hinge -->
    <circle cx="18" cy="380" r="22" fill="url(#motor)" stroke="#66ccff" stroke-width="3"/>
    <circle cx="18" cy="380" r="13" fill="#555" stroke="#777" stroke-width="1"/>
    <circle cx="18" cy="380" r="5" fill="#66ccff"/>
    <text x="18" y="383" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff" font-weight="700">AK80-9</text>
    <circle cx="18" cy="380" r="17" fill="none" stroke="#66ccff" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
    <circle cx="40" cy="370" r="4" fill="#00cc66"/>
    <text x="48" y="372" font-family="monospace" font-size="5" fill="#00cc66">ENC</text>

    <!-- Electromagnetic clutch -->
    <circle cx="18" cy="405" r="7" fill="none" stroke="#ff6633" stroke-width="1.5" stroke-dasharray="2,1"/>
    <text x="30" y="408" font-family="monospace" font-size="5" fill="#ff6633">离合器</text>

    <!-- Carbon fiber frame — lower -->
    <path d="M18,400 L14,470 L10,545" stroke="url(#frame)" stroke-width="12" stroke-linecap="round"/>
    <path d="M18,400 L14,470 L10,545" stroke="#444" stroke-width="8" stroke-linecap="round"/>

    <!-- Lower shank strap -->
    <rect x="-32" y="465" width="64" height="16" rx="5" fill="#2a2a2a" stroke="#555" stroke-width="1.5"/>
    <text x="0" y="476" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#aaa">IMU · 小腿</text>

    <!-- Ankle strap -->
    <rect x="-22" y="535" width="44" height="12" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1" opacity="0.6"/>
    <text x="0" y="544" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#777">足底压力接口</text>
  </g>

  <!-- ====== CALLOUTS (right side) ====== -->
  <g font-family="-apple-system,PingFang SC,sans-serif" font-size="11">

    <!-- 1. Waist Belt -->
    <line x1="520" y1="300" x2="430" y2="295" stroke="#66ccff" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="528" y="278" width="340" height="48" rx="6" fill="#fff" stroke="#dde1e6" stroke-width="1" filter="url(#card)"/>
    <text x="540" y="296" font-size="12" font-weight="700" fill="#000">腰带主控 + 电池</text>
    <text x="540" y="312" font-size="10" fill="#555">ESP32-S3 双 MCU · Samsung 50E 4S1P 72Wh</text>
    <text x="540" y="324" font-size="9" fill="#888">低重心设计 · 可换电 · USB-C PD 2h 充满</text>

    <!-- 2. Knee Motor -->
    <line x1="520" y1="500" x2="350" y2="495" stroke="#66ccff" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="528" y="475" width="340" height="60" rx="6" fill="#fff" stroke="#dde1e6" stroke-width="1" filter="url(#card)"/>
    <text x="540" y="493" font-size="12" font-weight="700" fill="#000">膝侧低减速比电机 + 电磁离合器</text>
    <text x="540" y="509" font-size="10" fill="#555">CubeMars AK80-9 · 22Nm 峰值 · 9:1 低减速比</text>
    <text x="540" y="521" font-size="10" fill="#555">反向驱动 0.51Nm · 断电自动脱开 → 零阻力</text>
    <text x="540" y="533" font-size="9" fill="#888">Ogura MCNB-3Z 电磁离合器 · &lt;30ms 响应</text>

    <!-- 3. Carbon Frame -->
    <line x1="520" y1="640" x2="350" y2="635" stroke="#66ccff" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="528" y="618" width="340" height="52" rx="6" fill="#fff" stroke="#dde1e6" stroke-width="1" filter="url(#card)"/>
    <text x="540" y="636" font-size="12" font-weight="700" fill="#000">碳纤维框架</text>
    <text x="540" y="652" font-size="10" fill="#555">两尺码设计（S/M + L/XL）· P5–P95 人体覆盖</text>
    <text x="540" y="664" font-size="9" fill="#888">碳纤维 3D 打印 · 独立绑带设计 · 不绑定服装品牌</text>

    <!-- 4. Safety -->
    <line x1="520" y1="780" x2="350" y2="775" stroke="#ff6633" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="528" y="755" width="340" height="60" rx="6" fill="#fff8f5" stroke="#ffcccc" stroke-width="1" filter="url(#card)"/>
    <text x="540" y="773" font-size="12" font-weight="700" fill="#cc3300">安全设计：断电 = 零阻力（Fail-Safe）</text>
    <text x="540" y="789" font-size="10" fill="#555">任何单点故障 → 电磁离合器自动脱开 → 零助力</text>
    <text x="540" y="801" font-size="10" fill="#555">双 MCU 独立监控 · 物理急停按钮 · IMU 跌倒检测</text>
    <text x="540" y="813" font-size="9" fill="#888">飞机起落架 Fail-Safe 原理 · 任何故障 → 安全状态</text>

    <!-- 5. 30s Wear -->
    <line x1="520" y1="890" x2="370" y2="885" stroke="#66ccff" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="528" y="873" width="340" height="40" rx="6" fill="#fff" stroke="#dde1e6" stroke-width="1" filter="url(#card)"/>
    <text x="540" y="891" font-size="12" font-weight="700" fill="#000">30 秒穿戴 · 三步完成</text>
    <text x="540" y="907" font-size="10" fill="#555">腰带快拆扣（1 秒）· 魔术贴绑带（20 秒）· 站立位完成（无需弯腰坐下）</text>
  </g>

  <!-- Bottom spec bar -->
  <g transform="translate(30, 910)">
    <rect x="0" y="0" width="840" height="44" rx="10" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#card)"/>
    <text x="70" y="18" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" font-weight="700" fill="#000">Gen 1 双膝</text>
    <text x="70" y="33" text-anchor="middle" font-size="9" fill="#666">碳纤维 · 2.0–2.5kg</text>
    <text x="210" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#000">22Nm 峰值力矩</text>
    <text x="210" y="33" text-anchor="middle" font-size="9" fill="#666">AK80-9 · 9:1 低减速比</text>
    <text x="350" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#000">2–3h 续航</text>
    <text x="350" y="33" text-anchor="middle" font-size="9" fill="#666">72Wh · USB-C PD</text>
    <text x="490" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#000">IP54 防护</text>
    <text x="490" y="33" text-anchor="middle" font-size="9" fill="#666">防尘防溅 · 雨天可用</text>
    <text x="630" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#000">断电零阻力</text>
    <text x="630" y="33" text-anchor="middle" font-size="9" fill="#666">Fail-Safe · &lt;30ms</text>
    <text x="770" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#000">30 秒穿戴</text>
    <text x="770" y="33" text-anchor="middle" font-size="9" fill="#666">三步 · 站立位完成</text>
  </g>
</svg>