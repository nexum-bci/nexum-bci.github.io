<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" width="720" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#e8ecf0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0096f0"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="motorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0096f0"/>
    </marker>
  </defs>

  <rect width="720" height="900" rx="16" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="720" height="56" rx="16" fill="url(#accentGrad)"/>
  <rect x="0" y="40" width="720" height="16" fill="url(#accentGrad)"/>
  <text x="360" y="36" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="18" font-weight="700" fill="#fff">Bones Gen 1 · 膝安 KneeEase · 消费级膝关节智能外骨骼</text>
  <text x="360" y="80" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="12" fill="#666">碳纤维框架 · 低减速比电机 · 腰带集中供电 · 30秒穿戴 · 运动护具外观</text>

  <!-- Human figure side view -->
  <g transform="translate(280, 110)" filter="url(#softShadow)">
    <ellipse cx="0" cy="120" rx="38" ry="55" fill="#d4c8b8" stroke="#b8a898" stroke-width="1.5"/>
    <ellipse cx="0" cy="170" rx="42" ry="22" fill="#d4c8b8" stroke="#b8a898" stroke-width="1"/>
    <circle cx="0" cy="28" r="28" fill="#d4c8b8" stroke="#b8a898" stroke-width="1.5"/>
    <path d="M-25,20 Q-28,0 -15,-8 Q0,-18 15,-8 Q28,0 25,20" fill="#c0c0c0" stroke="none"/>
    <path d="M0,192 Q5,260 8,340" stroke="#d4c8b8" stroke-width="48" stroke-linecap="round" fill="none"/>
    <path d="M-5,360 Q0,420 5,500" stroke="#d4c8b8" stroke-width="36" stroke-linecap="round" fill="none"/>
    <ellipse cx="35" cy="510" rx="50" ry="10" fill="#333" stroke="#222" stroke-width="1"/>
    <path d="M-25,140 Q-40,210 -30,280" stroke="#d4c8b8" stroke-width="18" stroke-linecap="round" fill="none"/>
    <path d="M-30,280 Q-20,340 -10,380" stroke="#d4c8b8" stroke-width="14" stroke-linecap="round" fill="none"/>
    <circle cx="-5" cy="385" r="8" fill="#d4c8b8"/>
    <line x1="-5" y1="385" x2="15" y2="530" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <path d="M-22,195 Q-15,340 -10,400" stroke="#335" stroke-width="44" stroke-linecap="round" fill="none" opacity="0.15"/>
  </g>

  <!-- Exoskeleton device -->
  <g transform="translate(280, 110)" filter="url(#shadow)">
    <rect x="-48" y="155" width="96" height="32" rx="10" fill="#1a1a2e" stroke="#0096f0" stroke-width="2"/>
    <text x="0" y="175" text-anchor="middle" font-family="monospace" font-size="8" fill="#0096f0" font-weight="700">MAIN CTRL</text>
    <rect x="-30" y="160" width="14" height="8" rx="2" fill="#0a0" opacity="0.8"/>
    <text x="-23" y="167" text-anchor="middle" font-family="monospace" font-size="5" fill="#fff">72Wh</text>
    <path d="M-5,200 Q25,220 15,260" stroke="#0096f0" stroke-width="2.5" fill="none" stroke-dasharray="6,3" opacity="0.6"/>
    <rect x="-30" y="230" width="60" height="14" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
    <text x="0" y="240" text-anchor="middle" font-family="monospace" font-size="6" fill="#aaa">IMU×2</text>
    <path d="M-5,200 L-5,280" stroke="url(#frameGrad)" stroke-width="10" stroke-linecap="round"/>
    <path d="M-5,200 L-5,280" stroke="#444" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-5" cy="295" r="18" fill="url(#motorGrad)" stroke="#0096f0" stroke-width="2.5"/>
    <circle cx="-5" cy="295" r="10" fill="#555" stroke="#666" stroke-width="1"/>
    <circle cx="-5" cy="295" r="3" fill="#0096f0"/>
    <text x="-5" y="298" text-anchor="middle" font-family="monospace" font-size="5" fill="#fff" font-weight="700">AK80</text>
    <circle cx="-5" cy="295" r="14" fill="none" stroke="#0096f0" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
    <text x="20" y="298" font-family="monospace" font-size="5" fill="#0096f0">9:1</text>
    <path d="M-5,310 L-5,420" stroke="url(#frameGrad)" stroke-width="10" stroke-linecap="round"/>
    <path d="M-5,310 L-5,420" stroke="#444" stroke-width="8" stroke-linecap="round"/>
    <rect x="-28" y="380" width="56" height="14" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
    <text x="0" y="390" text-anchor="middle" font-family="monospace" font-size="6" fill="#aaa">IMU×2</text>
    <path d="M-30,170 Q-40,230 -20,285" stroke="#0096f0" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="12" cy="295" r="4" fill="#00cc66" opacity="0.8"/>
    <text x="20" y="297" font-family="monospace" font-size="5" fill="#00cc66">ENC</text>
  </g>

  <!-- Callout annotations -->
  <g font-family="-apple-system,PingFang SC,sans-serif" font-size="11">
    <line x1="440" y1="280" x2="340" y2="278" stroke="#0096f0" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <text x="448" y="275" font-size="12" font-weight="700" fill="#000">腰带主控 + 电池</text>
    <text x="448" y="292" font-size="10" fill="#666">72Wh Samsung 50E 4S1P</text>
    <text x="448" y="306" font-size="10" fill="#666">ESP32-S3 MCU · 低重心设计</text>

    <line x1="440" y1="410" x2="300" y2="408" stroke="#0096f0" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <text x="448" y="405" font-size="12" font-weight="700" fill="#000">膝侧低减速比电机</text>
    <text x="448" y="422" font-size="10" fill="#666">CubeMars AK80-9 · 22Nm峰值</text>
    <text x="448" y="436" font-size="10" fill="#666">9:1低减速比 · 反向驱动0.51Nm</text>
    <text x="448" y="450" font-size="10" fill="#666">断电自动脱开 · 零阻力行走</text>

    <line x1="440" y1="530" x2="310" y2="528" stroke="#0096f0" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <text x="448" y="525" font-size="12" font-weight="700" fill="#000">碳纤维框架</text>
    <text x="448" y="542" font-size="10" fill="#666">两尺码设计 · P5-P95人体覆盖</text>
    <text x="448" y="556" font-size="10" fill="#666">独立绑带 · 不绑定服装</text>
    <text x="448" y="570" font-size="10" fill="#666">运动护具外观 · 双膝 ~2.0kg</text>

    <line x1="440" y1="640" x2="320" y2="638" stroke="#0096f0" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <text x="448" y="635" font-size="12" font-weight="700" fill="#000">IMU 传感器阵列</text>
    <text x="448" y="652" font-size="10" fill="#666">ICM-42688-P ×4（大腿+小腿）</text>
    <text x="448" y="666" font-size="10" fill="#666">AS5048A 磁性编码器 ×2</text>
    <text x="448" y="680" font-size="10" fill="#666">步态相位检测 · 实时力矩控制</text>

    <line x1="440" y1="740" x2="330" y2="738" stroke="#0096f0" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <text x="448" y="735" font-size="12" font-weight="700" fill="#000">30秒快速穿戴</text>
    <text x="448" y="752" font-size="10" fill="#666">三步穿戴 · 咔嗒确认</text>
    <text x="448" y="766" font-size="10" fill="#666">老人独立操作 · 无需协助</text>
  </g>

  <!-- Bottom spec bar -->
  <g transform="translate(40, 830)">
    <rect x="0" y="0" width="640" height="52" rx="10" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="80" y="22" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" font-weight="700" fill="#000">Gen 1 · 双膝</text>
    <text x="80" y="39" text-anchor="middle" font-size="10" fill="#666">碳纤维 · ~2.0kg</text>
    <text x="208" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#000">22Nm 峰值力矩</text>
    <text x="208" y="39" text-anchor="middle" font-size="10" fill="#666">AK80-9 · 9:1低减速比</text>
    <text x="336" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#000">2-3h 续航</text>
    <text x="336" y="39" text-anchor="middle" font-size="10" fill="#666">72Wh · USB-C PD充电</text>
    <text x="464" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#000">IP54 防护</text>
    <text x="464" y="39" text-anchor="middle" font-size="10" fill="#666">防尘防溅 · 雨天可用</text>
    <text x="592" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#000">断电零阻力</text>
    <text x="592" y="39" text-anchor="middle" font-size="10" fill="#666">电磁离合器自动脱开</text>
  </g>

  <text x="360" y="894" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="8" fill="#999">概念渲染图 · 产品外观可能随工程迭代调整 · Bones &amp; Manifold © 2026</text>
</svg>