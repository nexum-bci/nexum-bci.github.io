<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1020" width="960" height="1020">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="100%" stop-color="#edf0f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0096f0"/>
      <stop offset="100%" stop-color="#00a8e8"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a40"/>
      <stop offset="100%" stop-color="#1a1a20"/>
    </linearGradient>
    <linearGradient id="motorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.08"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.05"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0096f0"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#cc3300"/>
    </marker>
  </defs>

  <rect width="960" height="1020" rx="16" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="56" rx="16" fill="url(#accent)"/>
  <rect x="0" y="40" width="960" height="16" fill="url(#accent)"/>
  <text x="480" y="36" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="18" font-weight="700" fill="#fff">Bones Gen 1 · 膝安 KneeEase · 消费级膝关节运动辅助装置</text>
  <text x="480" y="82" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="12" fill="#666">碳纤维框架 · AK80-9 低减速比电机 · 腰带集中供电 · 30秒穿戴 · 断电 Fail-Safe · 运动护具外观</text>

  <!-- ====== HUMAN FIGURE ====== -->
  <g transform="translate(310, 120)" filter="url(#shadow)">
    <!-- Head -->
    <ellipse cx="0" cy="26" rx="26" ry="30" fill="#ead9c8" stroke="#c8b098" stroke-width="1.5"/>
    <!-- Hair (elder, grey) -->
    <path d="M-24,18 Q-28,-2 -14,-10 Q0,-18 14,-10 Q28,-2 24,18" fill="#c0c0c0"/>
    <!-- Face features: eyes, nose, mouth for character -->
    <ellipse cx="-8" cy="26" rx="3" ry="2" fill="#666"/>
    <ellipse cx="8" cy="26" rx="3" ry="2" fill="#666"/>
    <path d="M-3,34 Q0,36 3,34" fill="none" stroke="#999" stroke-width="1"/>
    <!-- Neck -->
    <rect x="-9" y="52" width="18" height="12" rx="4" fill="#ead9c8"/>

    <!-- Torso (clothed in casual wear, elderly style) -->
    <path d="M-44,64 Q-48,130 -42,180 Q-35,210 0,215 Q35,210 42,180 Q48,130 44,64 Z" fill="#5a6a7a" stroke="#3a4a5a" stroke-width="2"/>
    <!-- Collar line -->
    <path d="M-28,68 Q0,84 28,68" fill="none" stroke="#3a4a5a" stroke-width="1.5"/>

    <!-- LEFT ARM (behind body) -->
    <path d="M-44,80 Q-65,150 -55,240 Q-50,310 -55,380" stroke="#3a4a5a" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.35"/>

    <!-- RIGHT ARM (foreground, with cane in right hand) -->
    <path d="M44,80 Q62,145 54,220 Q50,280 54,370" stroke="#5a6a7a" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M54,370 Q52,400 48,430" stroke="#ead9c8" stroke-width="14" stroke-linecap="round" fill="none"/>
    <circle cx="46" cy="435" r="9" fill="#ead9c8"/>

    <!-- CANE in right hand -->
    <line x1="46" y1="435" x2="72" y2="630" stroke="#8B6914" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="67" cy="632" rx="7" ry="4" fill="#444"/>
    <!-- Cane rubber tip -->
    <rect x="62" y="628" width="10" height="8" rx="2" fill="#333"/>

    <!-- RIGHT LEG (with exoskeleton) -->
    <path d="M5,215 Q15,290 18,380" stroke="#5a6a7a" stroke-width="52" stroke-linecap="round" fill="none"/>
    <path d="M15,400 Q10,470 8,540 Q5,570 2,595" stroke="#5a6a7a" stroke-width="38" stroke-linecap="round" fill="none"/>
    <!-- Right foot -->
    <path d="M-22,593 L-34,599 Q-40,601 -44,599 L-18,613 Q-5,619 8,615 L28,601 Q34,599 38,601 L0,593 Z" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="-44" y="595" width="20" height="6" rx="2" fill="#1a1a1a"/>

    <!-- LEFT LEG (background, no exoskeleton) -->
    <path d="M-8,215 Q-20,290 -22,380 Q-24,470 -20,540 Q-18,570 -16,600" stroke="#3a4a5a" stroke-width="44" stroke-linecap="round" fill="none" opacity="0.3"/>
    <ellipse cx="-12" cy="605" rx="42" ry="8" fill="#222" opacity="0.25"/>
  </g>

  <!-- ====== EXOSKELETON ON RIGHT LEG ====== -->
  <g transform="translate(310, 120)" filter="url(#shadow)">
    <!-- Waist Belt -->
    <rect x="-56" y="168" width="112" height="36" rx="10" fill="#1a1a2e" stroke="#0096f0" stroke-width="2.5"/>
    <text x="0" y="184" text-anchor="middle" font-family="monospace" font-size="8" fill="#0096f0" font-weight="700">MCU + BMS</text>
    <text x="0" y="196" text-anchor="middle" font-family="monospace" font-size="6" fill="#888">ESP32-S3 · Samsung 50E 4S1P · 72Wh</text>
    <!-- LED indicators on belt -->
    <circle cx="-36" cy="186" r="3" fill="#10b981"/>
    <circle cx="-28" cy="186" r="3" fill="#10b981"/>
    <circle cx="-20" cy="186" r="3" fill="#ff9f0a"/>

    <!-- Power cable belt→knee (dashed for internal routing) -->
    <path d="M36,188 Q42,270 32,378" stroke="#0096f0" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.35"/>

    <!-- Upper thigh strap -->
    <rect x="-40" y="255" width="80" height="16" rx="5" fill="#2a2a30" stroke="#555" stroke-width="1.5"/>
    <text x="0" y="266" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#aaa">IMU · 大腿姿态 · 加速度</text>

    <!-- Carbon fiber frame — upper (thigh segment) -->
    <path d="M8,215 L16,300 L18,370" stroke="url(#frame)" stroke-width="11" stroke-linecap="round"/>
    <path d="M8,215 L16,300 L18,370" stroke="#444" stroke-width="7" stroke-linecap="round"/>
    <!-- Carbon fiber weave pattern hint -->
    <path d="M8,240 L18,245 M12,260 L18,265 M10,280 L18,285 M14,300 L20,300 M16,330 L24,325" stroke="#555" stroke-width="0.8" opacity="0.3"/>

    <!-- Knee joint — motor + hinge assembly -->
    <circle cx="18" cy="385" r="24" fill="url(#motorGrad)" stroke="#0096f0" stroke-width="3"/>
    <circle cx="18" cy="385" r="14" fill="#444" stroke="#666" stroke-width="1"/>
    <circle cx="18" cy="385" r="6" fill="#0096f0"/>
    <text x="18" y="388" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff" font-weight="700">AK80-9</text>
    <!-- Motor rotation indicator ring -->
    <circle cx="18" cy="385" r="20" fill="none" stroke="#0096f0" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <!-- Encoder dot -->
    <circle cx="44" cy="374" r="4" fill="#10b981"/>
    <text x="52" y="376" font-family="monospace" font-size="5" fill="#10b981">ENC</text>

    <!-- Electromagnetic clutch (below motor) -->
    <circle cx="18" cy="412" r="8" fill="none" stroke="#cc3300" stroke-width="1.5" stroke-dasharray="2,1"/>
    <text x="30" y="415" font-family="monospace" font-size="5.5" fill="#cc3300" font-weight="600">离合器 &lt;30ms</text>

    <!-- Carbon fiber frame — lower (shank segment) -->
    <path d="M18,405 L14,475 L10,555" stroke="url(#frame)" stroke-width="11" stroke-linecap="round"/>
    <path d="M18,405 L14,475 L10,555" stroke="#444" stroke-width="7" stroke-linecap="round"/>

    <!-- Lower shank strap -->
    <rect x="-34" y="475" width="68" height="16" rx="5" fill="#2a2a30" stroke="#555" stroke-width="1.5"/>
    <text x="0" y="486" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#aaa">IMU · 小腿姿态 · 角速度</text>

    <!-- Ankle/foot sensor interface -->
    <rect x="-24" y="548" width="48" height="14" rx="4" fill="#2a2a30" stroke="#555" stroke-width="1" opacity="0.7"/>
    <text x="0" y="558" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#888">足底压力传感器接口</text>
  </g>

  <!-- ====== CALLOUTS (right side) ====== -->
  <g font-family="-apple-system,PingFang SC,sans-serif">

    <!-- Callout 1: Waist Belt -->
    <line x1="500" y1="310" x2="435" y2="305" stroke="#0096f0" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <rect x="508" y="276" width="420" height="60" rx="8" fill="#fff" stroke="#d0d6de" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="508" y="276" width="4" height="60" rx="2" fill="#0096f0"/>
    <text x="522" y="296" font-size="13" font-weight="700" fill="#000">腰带主控 + 集中供电</text>
    <text x="522" y="312" font-size="10.5" fill="#444">ESP32-S3 双核 MCU · Samsung 50E 4S1P 72Wh 锂电池组</text>
    <text x="522" y="326" font-size="10" fill="#777">低重心腰带设计 · USB-C PD 2h 充满 · 可换电 · 全天续航</text>

    <!-- Callout 2: Knee Motor -->
    <line x1="500" y1="508" x2="345" y2="505" stroke="#0096f0" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <rect x="508" y="478" width="420" height="72" rx="8" fill="#fff" stroke="#d0d6de" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="508" y="478" width="4" height="72" rx="2" fill="#0096f0"/>
    <text x="522" y="498" font-size="13" font-weight="700" fill="#000">膝侧低减速比电机 + 电磁离合器</text>
    <text x="522" y="514" font-size="10.5" fill="#444">CubeMars AK80-9 · 9:1 低减速比 · 22Nm 峰值力矩 · 260g</text>
    <text x="522" y="528" font-size="10.5" fill="#444">反向驱动阻力仅 0.51Nm · 摆动相零阻力 · 支撑相精准助力</text>
    <text x="522" y="542" font-size="10" fill="#777">Ogura MCNB-3Z 电磁离合器 · &lt;30ms 脱开 · 断电自动零阻力</text>

    <!-- Callout 3: Carbon Frame -->
    <line x1="500" y1="660" x2="345" y2="655" stroke="#0096f0" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <rect x="508" y="635" width="420" height="62" rx="8" fill="#fff" stroke="#d0d6de" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="508" y="635" width="4" height="62" rx="2" fill="#0096f0"/>
    <text x="522" y="655" font-size="13" font-weight="700" fill="#000">碳纤维框架 · 两尺码人体覆盖</text>
    <text x="522" y="671" font-size="10.5" fill="#444">S/M 与 L/XL 两尺码设计 · 绑带无极调节 · P5–P95 人体覆盖</text>
    <text x="522" y="685" font-size="10" fill="#777">碳纤维 3D 打印框架 · 独立魔术贴绑带 · 不绑定服装品牌</text>

    <!-- Callout 4: Safety (highlighted in red) -->
    <line x1="500" y1="800" x2="345" y2="795" stroke="#cc3300" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <rect x="508" y="770" width="420" height="72" rx="8" fill="#fff8f5" stroke="#ffcccc" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="508" y="770" width="4" height="72" rx="2" fill="#cc3300"/>
    <text x="522" y="790" font-size="13" font-weight="700" fill="#cc3300">安全设计：断电 = 零阻力（Fail-Safe）</text>
    <text x="522" y="806" font-size="10.5" fill="#444">任何单点故障 → 电磁离合器自动脱开 → 零助力输出</text>
    <text x="522" y="820" font-size="10.5" fill="#444">双 MCU 独立监控 · 物理急停按钮 · IMU 跌倒检测</text>
    <text x="522" y="834" font-size="10" fill="#777">飞机起落架 Fail-Safe 原理 · 故障→安全状态，而非故障→危险状态</text>

    <!-- Callout 5: 30s Wear -->
    <line x1="500" y1="920" x2="370" y2="915" stroke="#0096f0" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <rect x="508" y="903" width="420" height="48" rx="8" fill="#fff" stroke="#d0d6de" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="508" y="903" width="4" height="48" rx="2" fill="#0096f0"/>
    <text x="522" y="921" font-size="13" font-weight="700" fill="#000">30 秒穿戴 · 三步完成 · 无需弯腰坐下</text>
    <text x="522" y="941" font-size="10.5" fill="#444">腰带快拆扣（1 秒）→ 魔术贴绑带（20 秒）→ 步行即用（站立位完成全部操作）</text>
  </g>

  <!-- Bottom spec bar -->
  <g transform="translate(30, 970)">
    <rect x="0" y="0" width="900" height="44" rx="10" fill="#fff" stroke="#dde1e6" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="65" y="18" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" font-size="10" font-weight="700" fill="#000">Gen 1 双膝标准</text>
    <text x="65" y="33" text-anchor="middle" font-size="9" fill="#666">碳纤维 · 2.0–2.5kg</text>
    <text x="195" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#000">22Nm 峰值力矩</text>
    <text x="195" y="33" text-anchor="middle" font-size="9" fill="#666">AK80-9 · 9:1 低减速比</text>
    <text x="325" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#000">2–3h 续航</text>
    <text x="325" y="33" text-anchor="middle" font-size="9" fill="#666">72Wh · USB-C PD · 可换电</text>
    <text x="455" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#000">IP54 防护</text>
    <text x="455" y="33" text-anchor="middle" font-size="9" fill="#666">防尘防溅 · 雨天可用</text>
    <text x="585" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#000">断电零阻力</text>
    <text x="585" y="33" text-anchor="middle" font-size="9" fill="#666">Fail-Safe · &lt;30ms 脱开</text>
    <text x="715" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#000">30 秒穿戴</text>
    <text x="715" y="33" text-anchor="middle" font-size="9" fill="#666">三步 · 站立位完成</text>
    <text x="840" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#000">RL 个性化力矩</text>
    <text x="840" y="33" text-anchor="middle" font-size="9" fill="#666">仿真训练 · 千人千面</text>
  </g>
</svg>